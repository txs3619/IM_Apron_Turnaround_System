<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apron Updating System - Staff</title>
<style>
  :root { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; --accent: #007bff; --watermark: rgba(0,0,0,0.15); --sel-bg: #ffffff; }
  [data-theme='dark'] { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; --accent: #1f6feb; --watermark: rgba(255,255,255,0.1); --sel-bg: #21262d; }
  
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; padding-bottom: 80px; }
  .header { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
  .btn { padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: #238636; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .btn-gray { background: #666; color: white; }
  
  .card { background: var(--card); padding: 20px; margin: 15px auto; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; max-width: 800px; position: relative; overflow: hidden; }
  .priority-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 8px; }
  
  .overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1500; overflow-y: auto; padding: 20px; }
  .input-wrapper { margin-bottom: 12px; text-align: left; }
  .input-wrapper label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
  
  /* 深色模式适配 */
  input, select, textarea { 
    padding: 10px; border-radius: 8px; border: 1px solid var(--border); 
    background: var(--sel-bg); color: var(--text); width: 100%; box-sizing: border-box; 
  }
  option { background: var(--sel-bg); color: var(--text); }
  
  .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  
  .st-delayed { color: #da3633 !important; }
  .st-assistance { color: #e3b341 !important; }
  .st-completed { color: #2ebc7f !important; }
  .st-notstarted { color: #8b949e !important; }
  .st-attached { color: #1f6feb !important; }

  select.sel-delayed { background-color: rgba(218, 54, 51, 0.25) !important; }
  select.sel-assistance { background-color: rgba(227, 179, 65, 0.25) !important; }
  select.sel-completed { background-color: rgba(46, 188, 127, 0.25) !important; }
  select.sel-attached { background-color: rgba(31, 111, 235, 0.25) !important; }

  details { margin-top: 15px; background: rgba(128,128,128,0.08); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
  summary { cursor: pointer; font-weight: bold; }
  .timer-box { font-family: monospace; font-size: 12px; margin-top: 6px; opacity: 0.8; }
  .log-item { padding: 6px; border-bottom: 1px solid var(--border); font-size: 13px; }
</style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; inset:0; background:var(--primary); z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:15px; width:90%; max-width:400px; text-align:center;">
        <h2 style="color:#333">STAFF LOGIN</h2>
        <input id="loginId" placeholder="Staff ID" style="margin-bottom:10px">
        <input id="loginPass" type="password" placeholder="Password" style="margin-bottom:15px">
        <button onclick="checkLogin()" class="btn btn-primary" style="width:100%">Login</button>
    </div>
</div>

<div id="mainContent" style="display:none">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px">
            <span id="userDisplay" style="font-weight:bold">Staff Dashboard</span>
        </div>
        <div style="display:flex; gap:10px">
            <button onclick="toggleTheme()" class="btn" style="background:none; font-size:20px">🌓</button>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </div>
    
    <div style="max-width:800px; margin:20px auto; padding:0 15px">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input id="search" placeholder="Search Flight/Apron..." onkeyup="renderFlights()" style="flex:1">
            <button onclick="document.getElementById('addModal').style.display='block'" class="btn btn-success">+ New Flight</button>
        </div>
        <div id="list"></div>
    </div>
</div>

<div id="editorOverlay" class="overlay">
    <div style="max-width:800px; margin:auto">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h2 id="editTitle">Update Flight</h2>
            <button onclick="closeEditor()" class="btn btn-gray">✕ Close</button>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div class="input-wrapper"><label>Apron</label><input id="editA"></div>
            <div class="input-wrapper"><label>Overall Status</label>
                <select id="t-Overall_Status" onchange="updateSelectColor(this)">
                    <option value="Not Started">Not Started</option>
                    <option value="Attached">Attached</option>
                    <option value="Need Assistance">Need Assistance</option>
                    <option value="Delayed">Delayed</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px">
            <div class="input-wrapper"><label>ETA (Estimated)</label><input type="datetime-local" id="editETA"></div>
            <div class="input-wrapper"><label>AT (Actual)</label><input type="datetime-local" id="editAT"></div>
            <div class="input-wrapper"><label>ETD (Departure)</label>
                <div style="display:flex; gap:5px"><input type="datetime-local" id="depTime"><button onclick="toggleTZ()" class="btn btn-primary" id="tzBtn" style="font-size:10px">UTC</button></div>
            </div>
        </div>

        <div id="categoryContainer"></div>
        <div class="input-wrapper"><label>Message</label><textarea id="msgInput" placeholder="Enter message for Admin..."></textarea></div>
        <button onclick="confirmUpdate()" class="btn btn-success" style="width:100%; height:50px">SAVE CHANGES</button>
        
        <div id="logSections">
            <details open><summary>💬 Message Logs</summary><div id="msgLogArea"></div></details>
            <details><summary>⚙️ Activity Logs</summary><div id="actionLogArea"></div></details>
        </div>
    </div>
</div>

<div id="addModal" class="overlay">
    <div style="max-width:400px; margin:100px auto; background:var(--card); padding:20px; border-radius:12px">
        <h3>Add Flight</h3>
        <input id="newF" placeholder="Flight No (e.g. MH123)"><br><br>
        <input id="newA" placeholder="Apron (e.g. A10)"><br><br>
        <button onclick="saveNewFlight()" class="btn btn-success" style="width:100%">Create</button>
        <button onclick="document.getElementById('addModal').style.display='none'" class="btn" style="width:100%; margin-top:10px">Cancel</button>
    </div>
</div>

<script>
const CATS = { "Admin": ["Flight Plan Approval","Engineering","Tow Truck Pushback"], "Cabin": ["PAX Boarding (F)","PAX Boarding (B)","Catering"], "Ground": ["Baggage Load","Fueling","Water","Lavatory"] };
let currentF = null, useUTC = true;
const STATUS_COLORS = { "Delayed": "#da3633", "Need Assistance": "#e3b341", "Attached": "#1f6feb", "Completed": "#2ebc7f", "Not Started": "#8b949e" };
const STATUS_CLASS = { "Delayed": "st-delayed", "Need Assistance": "st-assistance", "Attached": "st-attached", "Completed": "st-completed", "Not Started": "st-notstarted" };

function updateSelectColor(el) {
    el.classList.remove('sel-delayed','sel-assistance','sel-completed','sel-attached');
    if(el.value === "Delayed") el.classList.add('sel-delayed');
    else if(el.value === "Need Assistance") el.classList.add('sel-assistance');
    else if(el.value === "Completed") el.classList.add('sel-completed');
    else if(el.value === "Attached") el.classList.add('sel-attached');
}

function formatDT(iso) {
    if(!iso) return "-";
    const d = new Date(iso);
    return useUTC ? d.toISOString().replace('T',' ').substring(0,16) : d.toLocaleString([], {hour12:false}).substring(0,16);
}

function getPriorityColor(flight) {
    const tasks = [...Object.values(CATS).flat(), 'Overall Status'];
    const currentStatuses = tasks.map(t => flight[t] || "Not Started");
    const order = ["Need Assistance", "Delayed", "Attached", "Completed", "Not Started"];
    for (let s of order) { if (currentStatuses.includes(s)) return STATUS_COLORS[s]; }
    return STATUS_COLORS["Not Started"];
}

function calculateTimers(eta, at) {
    const now = new Date();
    let res = "";
    if (eta) {
        const diff = new Date(eta) - now;
        const mins = Math.floor(diff / 60000);
        res += `<span style="color:${mins < 0 ? '#da3633' : 'inherit'}">Countdown: ${mins}m</span>`;
    } else { res += `Countdown: 90m (Def)`; }
    if (at) {
        const diff = now - new Date(at);
        res += ` | <span style="color:#2ebc7f">Used: ${Math.floor(diff / 60000)}m</span>`;
    }
    return res;
}

function checkLogin() {
    const id = document.getElementById('loginId').value.trim();
    const pass = document.getElementById('loginPass').value;
    const users = JSON.parse(localStorage.getItem("users") || '{"admin":{"id":"admin","pass":"admin","name":"Staff User"}}');
    if(users[id] && users[id].pass === pass) {
        sessionStorage.setItem("user", JSON.stringify(users[id]));
        initApp();
    } else { alert("Invalid Credentials"); }
}

function initApp() {
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainContent').style.display='block';
    renderFlights();
    setInterval(renderFlights, 30000);
}

function renderFlights() {
    const db = JSON.parse(localStorage.getItem("flights") || "{}");
    const s = document.getElementById('search').value.toUpperCase();
    const list = document.getElementById("list"); list.innerHTML = "";
    for(let f in db) {
        if(!f.includes(s) && !db[f].apron.includes(s)) continue;
        const d = db[f];
        const bar = getPriorityColor(d);
        const card = document.createElement("div"); card.className = "card";
        card.onclick = () => openEditor(f);
        card.innerHTML = `
            <div class="priority-bar" style="background:${bar}"></div>
            <div style="margin-left:12px">
                <div style="display:flex; justify-content:space-between"><b>${f}</b> <span>${d.apron}</span></div>
                <div style="font-size:13px; margin-top:5px">Status: <b class="${STATUS_CLASS[d['Overall Status']]}">${d['Overall Status']}</b></div>
                <div class="timer-box">${calculateTimers(d.eta, d.at)}</div>
            </div>`;
        list.appendChild(card);
    }
}

function openEditor(f) {
    currentF = f;
    const d = JSON.parse(localStorage.getItem("flights"))[f];
    document.getElementById('editTitle').innerText = "Update: " + f;
    document.getElementById('editA').value = d.apron;
    document.getElementById('t-Overall_Status').value = d['Overall Status'];
    updateSelectColor(document.getElementById('t-Overall_Status'));
    document.getElementById('editETA').value = d.eta ? d.eta.substring(0,16) : "";
    document.getElementById('editAT').value = d.at ? d.at.substring(0,16) : "";
    document.getElementById('depTime').value = d.etd ? d.etd.substring(0,16) : "";
    
    let h = "";
    for(let c in CATS) {
        h += `<div style="background:rgba(128,128,128,0.05); padding:10px; margin-bottom:10px; border-radius:8px"><b>${c}</b><div class="task-grid">`;
        CATS[c].forEach(t => {
            const val = d[t] || 'Not Started';
            h += `<div><label style="font-size:10px">${t}</label>
                <select id="t-${t.replace(/\s+/g,'_')}" onchange="updateSelectColor(this)">
                    <option value="Not Started" ${val=='Not Started'?'selected':''}>Not Started</option>
                    <option value="Attached" ${val=='Attached'?'selected':''}>Attached</option>
                    <option value="Need Assistance" ${val=='Need Assistance'?'selected':''}>Need Assistance</option>
                    <option value="Delayed" ${val=='Delayed'?'selected':''}>Delayed</option>
                    <option value="Completed" ${val=='Completed'?'selected':''}>Completed</option>
                </select></div>`;
        });
        h += `</div></div>`;
    }
    document.getElementById('categoryContainer').innerHTML = h;
    document.querySelectorAll('#categoryContainer select').forEach(s => updateSelectColor(s));
    renderLogs(d.logs || []);
    document.getElementById('editorOverlay').style.display="block";
}

function renderLogs(logs) {
    const m = document.getElementById('msgLogArea'); const a = document.getElementById('actionLogArea');
    m.innerHTML = ""; a.innerHTML = "";
    logs.slice().reverse().forEach(l => {
        const row = `<div class="log-item"><b>${l.user}</b> [${formatDT(l.time)}]: ${l.task} -> <span class="${STATUS_CLASS[l.status]||''}">${l.status}</span></div>`;
        if(l.task === "Message") m.innerHTML += row; else a.innerHTML += row;
    });
}

function confirmUpdate() {
    let db = JSON.parse(localStorage.getItem("flights"));
    const u = JSON.parse(sessionStorage.getItem("user"));
    const fData = db[currentF];
    const now = new Date().toISOString();

    const check = (key, val, label) => { if(fData[key] !== val){ fData.logs.push({time:now, task:label, status:val, user:u.name}); fData[key] = val; } };

    check('apron', document.getElementById('editA').value.toUpperCase(), 'Apron');
    check('Overall Status', document.getElementById('t-Overall_Status').value, 'Overall Status');
    check('eta', document.getElementById('editETA').value ? new Date(document.getElementById('editETA').value).toISOString() : "", 'ETA');
    check('at', document.getElementById('editAT').value ? new Date(document.getElementById('editAT').value).toISOString() : "", 'AT');
    check('etd', document.getElementById('depTime').value ? new Date(document.getElementById('depTime').value).toISOString() : "", 'ETD');

    Object.values(CATS).flat().forEach(t => { check(t, document.getElementById(`t-${t.replace(/\s+/g,'_')}`).value, t); });

    const msg = document.getElementById('msgInput').value.trim();
    if(msg) { fData.logs.push({time:now, task:"Message", status:msg, user:u.name}); document.getElementById('msgInput').value = ""; }

    localStorage.setItem("flights", JSON.stringify(db));
    alert("Changes Saved Successfully");
    renderFlights(); renderLogs(fData.logs);
}

function saveNewFlight() {
    const f = document.getElementById('newF').value.toUpperCase();
    if(!f) return;
    let db = JSON.parse(localStorage.getItem("flights") || "{}");
    db[f] = {apron:document.getElementById('newA').value.toUpperCase(), 'Overall Status':'Not Started', logs:[], etd:"", eta:"", at:""};
    localStorage.setItem("flights", JSON.stringify(db));
    location.reload();
}
function toggleTZ() { useUTC = !useUTC; document.getElementById('tzBtn').innerText = useUTC?"UTC":"Local"; if(currentF) openEditor(currentF); }
function toggleTheme() { 
    const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); 
}
function closeEditor() { document.getElementById('editorOverlay').style.display='none'; renderFlights(); }
function logout() { sessionStorage.clear(); location.reload(); }
window.onload = () => { 
    if(localStorage.getItem('theme')) document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));
    if(sessionStorage.getItem("user")) initApp(); 
};
</script>
</body>
</html>
