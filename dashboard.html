<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apron Dashboard - Admin</title>
<style>
  :root { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; }
  [data-theme='light'] { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; padding-bottom: 60px; }
  .watermark { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: bold; color: rgba(128,128,128,0.2); pointer-events: none; z-index: 9999; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 1000; }
  .btn { padding: 8px 14px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .btn-success { background: #238636; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-sm { padding: 4px 8px; font-size: 11px; }
  .card { background: var(--card); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid var(--border); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; padding: 20px; overflow-y: auto; }
  .log-box { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; }
  .msg-item { background: rgba(88,166,255,0.1); border-left: 4px solid #58a6ff; padding: 8px 12px; margin-bottom: 8px; font-size: 16px; }
  .log-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
  .act-item { font-size: 15px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  #search { padding:8px; border-radius:6px; background: var(--card); color: var(--text); border:1px solid var(--border); }
  
  /* 批量控制台容器 */
  .control-group { display: flex; gap: 8px; align-items: center; background: rgba(128,128,128,0.1); padding: 5px 12px; border-radius: 8px; }
</style>
</head>
<body>

<div class="watermark">ADMIN DASHBOARD</div>

<div class="header">
    <div style="display:flex; gap:12px; align-items:center">
        <h2>Dashboard</h2>
        <div class="control-group">
            <button onclick="toggleSelectAll()" class="btn btn-primary" id="selBtn">Select All</button>
            <button onclick="toggleMsgAll()" class="btn" id="mExpBtn" style="background:#444; color:white">Msg: OFF</button>
            <button onclick="toggleActAll()" class="btn" id="aExpBtn" style="background:#444; color:white">Act: OFF</button>
            <button onclick="bulkDel()" class="btn btn-danger" id="bDel" style="display:none">Del Selected</button>
        </div>
        <button onclick="document.getElementById('addFModal').style.display='block'" class="btn btn-success">+ Flight</button>
    </div>
    <div style="display:flex; gap:10px">
        <button onclick="document.getElementById('userModal').style.display='block'; renderUsers();" class="btn btn-primary">Users</button>
        <button onclick="toggleTheme()" class="btn" style="background:#444; color:white; font-size:18px">🌓</button>
        <input id="search" placeholder="Search..." onkeyup="load()">
    </div>
</div>

<div id="list"></div>

<div id="addFModal" class="overlay">
    <div style="background:var(--card); max-width:400px; margin:auto; padding:20px; border-radius:10px">
        <h3>Add New Flight</h3>
        <input id="newF" placeholder="Flight Number" style="width:100%; padding:10px; margin-bottom:10px"><br>
        <input id="newA" placeholder="Apron Number" style="width:100%; padding:10px; margin-bottom:10px"><br>
        <button onclick="saveNewFlight()" class="btn btn-success" style="width:100%">Create</button>
        <button onclick="document.getElementById('addFModal').style.display='none'" class="btn" style="width:100%; margin-top:10px">Cancel</button>
    </div>
</div>

<div id="userModal" class="overlay">
    <div style="background:var(--card); max-width:900px; margin:auto; padding:20px; border-radius:10px">
        <div style="display:flex; justify-content:space-between"><h3>User Management</h3><button onclick="document.getElementById('userModal').style.display='none'" class="btn">✕</button></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px">
            <div style="background:rgba(128,128,128,0.1); padding:15px; border-radius:8px">
                <h4>Add User</h4>
                <input id="uId" placeholder="ID" style="width:90%; margin-bottom:5px"><br>
                <input id="uName" placeholder="Name" style="width:90%; margin-bottom:5px"><br>
                <input id="uPos" placeholder="Position" style="width:90%; margin-bottom:5px"><br>
                <input id="uPass" placeholder="Password" style="width:90%; margin-bottom:10px"><br>
                <button onclick="saveUser(false)" class="btn btn-success" style="width:100%">Create</button>
            </div>
            <div style="background:rgba(128,128,128,0.1); padding:15px; border-radius:8px">
                <h4>Edit User</h4>
                <input id="eId" readonly style="width:90%; margin-bottom:5px; opacity:0.6"><br>
                <input id="eName" placeholder="Name" style="width:90%; margin-bottom:5px"><br>
                <input id="ePos" placeholder="Position" style="width:90%; margin-bottom:5px"><br>
                <input id="ePass" placeholder="New Password" style="width:90%; margin-bottom:10px"><br>
                <button onclick="saveUser(true)" class="btn btn-primary" style="width:100%">Update</button>
            </div>
        </div>
        <h4>Existing Users</h4>
        <table>
            <thead><tr><th>ID</th><th>Name</th><th>Position</th><th>Action</th></tr></thead>
            <tbody id="userList"></tbody>
        </table>
    </div>
</div>

<script>
let isAllSelected = false;
let isMsgExpanded = localStorage.getItem('admin_msg_expanded') === 'true';
let isActExpanded = localStorage.getItem('admin_act_expanded') === 'true';

document.body.setAttribute('data-theme', localStorage.getItem('adminTheme') || 'dark');

function load() {
    const db = JSON.parse(localStorage.getItem("flights") || "{}");
    const s = document.getElementById('search').value.toUpperCase();
    const list = document.getElementById("list"); list.innerHTML = "";
    
    document.getElementById('mExpBtn').innerText = isMsgExpanded ? "Msg: ON" : "Msg: OFF";
    document.getElementById('aExpBtn').innerText = isActExpanded ? "Act: ON" : "Act: OFF";
    document.getElementById('selBtn').innerText = isAllSelected ? "Cancel" : "Select All";

    for(let f in db) {
        if(!f.includes(s) && !db[f].apron.includes(s)) continue;
        const d = db[f];
        const logs = d.logs || [];
        const card = document.createElement("div"); card.className = "card";
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div style="font-size:18px"><input type="checkbox" class="bulk" data-id="${f}" ${isAllSelected?'checked':''} onchange="updateUI()"> <b>${f}</b> (Apron: ${d.apron})</div>
                <div style="font-size:16px">Status: <b style="color:var(--primary)">${d['Overall Status']}</b> | <button onclick="delF('${f}')" class="btn btn-danger btn-sm">Delete</button></div>
            </div>
            <div style="margin-top:15px; display:flex; gap:10px">
                <input id="msg-${f}" placeholder="Reply to Staff..." style="flex:1; padding:10px; border-radius:6px; background:var(--bg); color:var(--text); border:1px solid var(--border)">
                <button onclick="sendMsg('${f}')" class="btn btn-success">Send Reply</button>
            </div>
            <div class="log-box">
                <div class="log-title">
                    💬 Message Log 
                    <button class="btn btn-primary btn-sm" onclick="toggleLocalLog('${f}', 'msg')">Show/Hide</button>
                </div>
                <div id="local-msg-${f}" style="display:${isMsgExpanded?'block':'none'}">
                    ${logs.filter(l=>l.task==='Message').reverse().map(m=>`<div class="msg-item"><b>[${m.time.substring(11,19)}] ${m.user}:</b> ${m.status}</div>`).join('') || '<p style="color:#666">No messages.</p>'}
                </div>

                <div class="log-title" style="margin-top:20px">
                    ⚙️ Activity Log 
                    <button class="btn btn-primary btn-sm" onclick="toggleLocalLog('${f}', 'act')">Show/Hide</button>
                </div>
                <div id="local-act-${f}" style="display:${isActExpanded?'block':'none'}">
                    ${logs.filter(l=>l.task!=='Message').reverse().map(a=>`<div class="act-item">[${a.time.substring(11,19)}] ${a.task} → <b>${a.status}</b></div>`).join('') || '<p style="color:#666">No activity.</p>'}
                </div>
            </div>
        `;
        list.appendChild(card);
    }
    updateUI();
}

function toggleSelectAll() {
    isAllSelected = !isAllSelected;
    document.querySelectorAll('.bulk').forEach(c => c.checked = isAllSelected);
    document.getElementById('selBtn').innerText = isAllSelected ? "Cancel" : "Select All";
    updateUI();
}

function toggleLocalLog(f, type) {
    const el = document.getElementById(`local-${type}-${f}`);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function toggleMsgAll() { isMsgExpanded = !isMsgExpanded; localStorage.setItem('admin_msg_expanded', isMsgExpanded); load(); }
function toggleActAll() { isActExpanded = !isActExpanded; localStorage.setItem('admin_act_expanded', isActExpanded); load(); }

window.addEventListener('storage', (e) => { if(e.key === 'flights' || e.key === 'users') load(); });

function sendMsg(f) {
    const txt = document.getElementById(`msg-${f}`).value.trim();
    if(!txt) return;
    let db = JSON.parse(localStorage.getItem("flights"));
    db[f].logs.push({time: new Date().toISOString(), task:"Message", status:txt, user:"Admin"});
    localStorage.setItem("flights", JSON.stringify(db));
    load();
}

function saveNewFlight() {
    const f = document.getElementById('newF').value.trim().toUpperCase();
    const a = document.getElementById('newA').value.trim().toUpperCase();
    if(!f || !a) return;
    let db = JSON.parse(localStorage.getItem("flights") || "{}");
    db[f] = { apron: a, 'Overall Status': 'Not Started', logs: [], etd: "" };
    localStorage.setItem("flights", JSON.stringify(db));
    document.getElementById('addFModal').style.display='none';
    load();
}

function renderUsers() {
    const users = JSON.parse(localStorage.getItem("users") || '{"admin":{"id":"admin","pass":"admin","name":"Admin","pos":"Administrator"}}');
    const uList = document.getElementById("userList"); uList.innerHTML = "";
    for(let id in users) {
        uList.innerHTML += `<tr><td>${id}</td><td>${users[id].name}</td><td>${users[id].pos}</td>
            <td><button onclick="loadUserEdit('${id}')" class="btn">Edit</button> <button onclick="delU('${id}')" class="btn btn-danger">Del</button></td></tr>`;
    }
}

function saveUser(isEdit) {
    let users = JSON.parse(localStorage.getItem("users") || "{}");
    const prefix = isEdit ? 'e' : 'u';
    const id = document.getElementById(prefix+'Id').value.trim();
    if(!id) return alert("ID required");
    users[id] = { id, name: document.getElementById(prefix+'Name').value, pos: document.getElementById(prefix+'Pos').value,
        pass: document.getElementById(prefix+'Pass').value || (isEdit ? users[id].pass : "1234") };
    localStorage.setItem("users", JSON.stringify(users));
    renderUsers();
}

function loadUserEdit(id) {
    const u = JSON.parse(localStorage.getItem("users"))[id];
    document.getElementById('eId').value = u.id;
    document.getElementById('eName').value = u.name;
    document.getElementById('ePos').value = u.pos;
}

function updateUI() { 
    const checkedCount = document.querySelectorAll('.bulk:checked').length;
    document.getElementById('bDel').style.display = checkedCount > 0 ? 'inline-block' : 'none'; 
}

function bulkDel() { if(confirm("Del selected flights?")) { let db = JSON.parse(localStorage.getItem("flights")); document.querySelectorAll('.bulk:checked').forEach(c => delete db[c.dataset.id]); localStorage.setItem("flights", JSON.stringify(db)); load(); } }
function delF(f) { if(confirm("Del?")) { let db = JSON.parse(localStorage.getItem("flights")); delete db[f]; localStorage.setItem("flights", JSON.stringify(db)); load(); } }

function toggleTheme() { 
    const nt = document.body.getAttribute('data-theme')==='dark'?'light':'dark';
    document.body.setAttribute('data-theme', nt); localStorage.setItem('adminTheme', nt); 
}
function delU(id) { if(confirm("Del?")) { let u = JSON.parse(localStorage.getItem("users")); delete u[id]; localStorage.setItem("users", JSON.stringify(u)); renderUsers(); } }
window.onload = load;
</script>
</body>
</html>
