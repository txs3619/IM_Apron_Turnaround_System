<script>
// Firebase 配置保持不变...

function load() {
    db.ref('flights').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const s = document.getElementById('search').value.toUpperCase();
        const list = document.getElementById("list"); list.innerHTML = "";
        
        // 恢复：全选按钮状态重置
        if(document.getElementById('selBtn')) document.getElementById('selBtn').innerText = "Select All";

        for(let f in data) {
            if(!f.includes(s) && !data[f].apron.includes(s)) continue;
            const d = data[f];
            const card = document.createElement("div"); card.className = "card";
            card.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px">
                    <input type="checkbox" class="bulk" data-id="${f}" onchange="updateUI()">
                    <div style="flex:1">
                        <div style="display:flex; justify-content:space-between">
                            <b>${f}</b> (Apron: ${d.apron})
                            <button onclick="delF('${f}')" class="btn btn-danger btn-sm">Bin</button>
                        </div>
                        </div>
                </div>`;
            list.appendChild(card);
        }
    });
}

// 恢复：批量删除逻辑 (操作 Firebase)
function bulkDel() {
    const checked = document.querySelectorAll('.bulk:checked');
    if(!confirm(`Move ${checked.length} flights to Recycle Bin?`)) return;
    
    const updates = {};
    const binUpdates = {};
    
    checked.forEach(c => {
        const id = c.dataset.id;
        binUpdates[id] = allFlights[id]; // allFlights 是本地缓存的最新云端数据
        updates[id] = null; // 在原节点设为 null 表示删除
    });

    db.ref('deletedFlights').update(binUpdates);
    db.ref('flights').update(updates);
}

// 恢复：删除至回收站逻辑
function delF(f) {
    if(!confirm(`Move ${f} to Recycle Bin?`)) return;
    db.ref('flights/' + f).once('value').then(s => {
        db.ref('deletedFlights/' + f).set(s.val());
        db.ref('flights/' + f).remove();
    });
}

function updateUI() {
    const count = document.querySelectorAll('.bulk:checked').length;
    if(document.getElementById('bDel')) document.getElementById('bDel').style.display = count ? 'inline-block' : 'none';
}
</script>
