<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apron Dashboard - Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
  :root { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; }
  [data-theme='light'] { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; transition: 0.3s; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 1000; }
  .btn { padding: 8px 14px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
  .btn-primary { background: #1f6feb; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .btn-warning { background: #e3b341; color: #000; }
  .btn-success { background: #238636; color: white; }
  .card { background: var(--card); border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid var(--border); transition: box-shadow 0.2s; }
  .card.selected { box-shadow: 0 0 0 2px #58a6ff; border-color: #58a6ff; }
  .msg-alert { background: rgba(88,166,255,0.1); border-left: 4px solid var(--primary); padding: 10px; border-radius: 4px; margin: 10px 0; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; padding: 20px; overflow-y: auto; }
  .settings-box { background: var(--card); max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
  .log-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .log-scroll { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 8px; font-size: 11px; border-radius: 5px; }

  /* Multi-select toolbar */
  #bulkToolbar { display: none; position: sticky; top: 65px; z-index: 900; background: #1f6feb; color: white; padding: 10px 20px; display: none; align-items: center; gap: 10px; flex-wrap: wrap; }
  #bulkToolbar.active { display: flex; }

  /* Recycle bin overlay */
  #recycleOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 4000; padding: 20px; overflow-y: auto; }
  .recycle-box { background: var(--card); max-width: 600px; margin: 40px auto; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
  .recycle-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }

  /* Checkbox styling */
  .select-check { width: 18px; height: 18px; cursor: pointer; accent-color: #58a6ff; margin-right: 8px; }

  /* Bulk status select */
  #bulkStatusSelect { padding: 6px 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
</style>
</head>
<body data-theme="dark">

<div class="header">
    <div style="display:flex; align-items:center; gap:10px">
        <h2 style="margin:0">Admin Console</h2>
        <label style="font-size:13px; cursor:pointer; display:flex; align-items:center; gap:5px; user-select:none">
            <input type="checkbox" id="selectAllChk" class="select-check" onchange="toggleSelectAll(this.checked)">
            Select All
        </label>
    </div>
    <div style="display:flex; gap:10px">
        <button id="tzBtn" onclick="toggleTZ()" class="btn btn-primary">UTC</button>
        <button onclick="document.getElementById('setModal').style.display='block'" class="btn">⚙️ Settings</button>
    </div>
</div>

<!-- Bulk action toolbar — shown when any flight selected -->
<div id="bulkToolbar">
    <span id="selectedCount">0 selected</span>
    <select id="bulkStatusSelect">
        <option value="">— Toggle Status —</option>
        <option>Not Started</option>
        <option>In Progress</option>
        <option>Completed</option>
        <option>Delayed</option>
        <option>Required Assistance</option>
    </select>
    <button onclick="applyBulkStatus()" class="btn btn-success">✓ Apply Status</button>
    <button onclick="bulkRecycle()" class="btn btn-danger">🗑️ Move to Recycle Bin</button>
    <button onclick="clearSelection()" class="btn" style="background:rgba(255,255,255,0.2); color:white; margin-left:auto">✕ Cancel</button>
</div>

<div id="list"></div>

<!-- Settings modal -->
<div id="setModal" class="overlay">
    <div class="settings-box">
        <h3>Control Panel</h3>
        <button onclick="toggleAllLogs()" class="btn btn-primary" style="width:100%; margin-bottom:10px">📂 Expand/Collapse All Logs</button>
        <button onclick="toggleTheme()" class="btn" style="width:100%; margin-bottom:10px">🌓 Toggle Theme</button>
        <button onclick="openRecycleBin()" class="btn btn-warning" style="width:100%; margin-bottom:10px">🗑️ Recycle Bin</button>
        <button onclick="alert('Users clicked')" class="btn" style="width:100%; margin-bottom:10px">👥 User Management</button>
        <button onclick="document.getElementById('setModal').style.display='none'" class="btn btn-danger" style="width:100%; margin-top:10px">Close</button>
    </div>
</div>

<!-- Recycle Bin overlay -->
<div id="recycleOverlay">
    <div class="recycle-box">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h3 style="margin:0">🗑️ Recycle Bin</h3>
            <button onclick="document.getElementById('recycleOverlay').style.display='none'" class="btn btn-danger">Close</button>
        </div>
        <div id="recycleList"><i>Loading...</i></div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNcUXtBufxeST6EzJEa2Me562cdkzBJMM",
  authDomain: "im-apron-turnaround-system.firebaseapp.com",
  databaseURL: "https://im-apron-turnaround-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "im-apron-turnaround-system",
  storageBucket: "im-apron-turnaround-system.firebasestorage.app",
  messagingSenderId: "984848540764",
  appId: "1:984848540764:web:4a54026553c971acb33299"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allF = {}, useUTC = true, allOpen = false;
let selectedFlights = new Set();
// FIX: single listener reference
let flightsRef = null;

function formatDate(iso) {
    if(!iso) return "-";
    const d = new Date(iso);
    if(useUTC) return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0')+' '+String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')+':'+String(d.getUTCSeconds()).padStart(2,'0');
    return d.toLocaleString();
}

// FIX: Attach listener once, update allF and re-render without re-binding
function render() {
    if(flightsRef) return; // already listening
    flightsRef = db.ref('flights');
    flightsRef.on('value', s => {
        allF = s.val() || {};
        renderList();
    });
}

function renderList() {
    const list = document.getElementById("list"); list.innerHTML = "";
    for(let f in allF) {
        const d = allF[f];
        if(d._deleted) continue; // hide recycled flights
        const msgs = d.msgs || [];
        const logs = d.logs || [];
        const unreadMsg = msgs.slice().reverse().find(m => m.user !== "Admin" && !m.read);
        const isSelected = selectedFlights.has(f);

        const card = document.createElement("div");
        card.className = "card" + (isSelected ? " selected" : "");
        card.id = "card-" + f;

        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:flex-start">
                <div style="display:flex; align-items:center; gap:8px">
                    <input type="checkbox" class="select-check flight-chk" data-flight="${f}" ${isSelected?'checked':''} onchange="toggleSelect('${f}', this.checked)" onclick="event.stopPropagation()">
                    <b>${f} (Apron: ${d.apron})</b>
                </div>
                <span style="font-size:12px; color:var(--primary)">${d['Overall Status']}</span>
            </div>
            ${unreadMsg ? `<div class="msg-alert">
                <button onclick="markReadAdmin('${f}', ${msgs.indexOf(unreadMsg)}); event.stopPropagation()" class="btn btn-primary" style="float:right; font-size:10px; padding:2px 5px">Mark Read</button>
                <b>STAFF:</b> ${unreadMsg.status} <small>(${formatDate(unreadMsg.time)})</small>
            </div>` : ""}
            <div style="display:flex; gap:5px; margin-top:10px">
                <input id="reply-${f}" placeholder="Reply to staff..." onclick="event.stopPropagation()" style="flex:1; padding:8px; border-radius:4px; border:1px solid var(--border); background:var(--bg); color:var(--text)">
                <button onclick="sendReply('${f}'); event.stopPropagation()" class="btn btn-primary">Send</button>
            </div>
            <div class="log-container">
                <details ${allOpen?'open':''}><summary style="cursor:pointer; font-size:12px">💬 Messages (${msgs.length})</summary>
                    <div class="log-scroll">${msgs.slice().reverse().map(m=>`<div>[${formatDate(m.time)}] ${m.user}: ${m.status} ${m.read?'✓':''}</div>`).join('')}</div>
                </details>
                <details ${allOpen?'open':''}><summary style="cursor:pointer; font-size:12px">⚙️ Actions (${logs.length})</summary>
                    <div class="log-scroll">${logs.slice().reverse().map(l=>`<div>[${formatDate(l.time)}] ${l.task}->${l.status}</div>`).join('')}</div>
                </details>
            </div>`;
        list.appendChild(card);
    }
    updateToolbar();
}

// ── Multi-select logic ──────────────────────────────────────────
function toggleSelect(f, checked) {
    if(checked) selectedFlights.add(f);
    else selectedFlights.delete(f);
    const card = document.getElementById("card-" + f);
    if(card) card.classList.toggle("selected", checked);
    updateToolbar();
}

function toggleSelectAll(checked) {
    selectedFlights.clear();
    if(checked) { for(let f in allF) { if(!allF[f]._deleted) selectedFlights.add(f); } }
    renderList();
}

function clearSelection() {
    selectedFlights.clear();
    document.getElementById('selectAllChk').checked = false;
    renderList();
}

function updateToolbar() {
    const toolbar = document.getElementById('bulkToolbar');
    const count = selectedFlights.size;
    toolbar.classList.toggle('active', count > 0);
    document.getElementById('selectedCount').innerText = count + " selected";
}

// ── Bulk actions ────────────────────────────────────────────────
function applyBulkStatus() {
    const status = document.getElementById('bulkStatusSelect').value;
    if(!status) { alert("Please choose a status first."); return; }
    if(selectedFlights.size === 0) return;
    if(!confirm(`Set ${selectedFlights.size} flight(s) to "${status}"?`)) return;
    const updates = {};
    selectedFlights.forEach(f => { updates['flights/' + f + '/Overall Status'] = status; });
    db.ref().update(updates).then(() => clearSelection());
}

function bulkRecycle() {
    if(selectedFlights.size === 0) return;
    if(!confirm(`Move ${selectedFlights.size} flight(s) to Recycle Bin?`)) return;
    const now = new Date().toISOString();
    const updates = {};
    selectedFlights.forEach(f => {
        updates['flights/' + f + '/_deleted'] = true;
        updates['flights/' + f + '/_deletedAt'] = now;
    });
    db.ref().update(updates).then(() => clearSelection());
}

// ── Recycle Bin ─────────────────────────────────────────────────
function openRecycleBin() {
    document.getElementById('setModal').style.display = 'none';
    document.getElementById('recycleOverlay').style.display = 'block';
    loadRecycleBin();
}

function loadRecycleBin() {
    const container = document.getElementById('recycleList');
    container.innerHTML = "<i>Loading...</i>";
    db.ref('flights').once('value', s => {
        const data = s.val() || {};
        const deleted = Object.entries(data).filter(([,v]) => v._deleted);
        if(deleted.length === 0) { container.innerHTML = "<p style='color:#888'>Recycle bin is empty.</p>"; return; }
        container.innerHTML = deleted.map(([f, d]) => `
            <div class="recycle-item">
                <div>
                    <b>${f}</b> — Apron: ${d.apron}<br>
                    <small style="color:#888">Deleted: ${formatDate(d._deletedAt)}</small>
                </div>
                <div style="display:flex; gap:8px">
                    <button onclick="restoreFlight('${f}')" class="btn btn-success" style="font-size:12px; padding:5px 10px">↩ Restore</button>
                    <button onclick="permanentDelete('${f}')" class="btn btn-danger" style="font-size:12px; padding:5px 10px">✕ Delete</button>
                </div>
            </div>`).join('');
    });
}

function restoreFlight(f) {
    db.ref('flights/'+f+'/_deleted').remove();
    db.ref('flights/'+f+'/_deletedAt').remove();
    loadRecycleBin();
}

function permanentDelete(f) {
    if(!confirm(`Permanently delete flight ${f}? This cannot be undone.`)) return;
    db.ref('flights/'+f).remove().then(() => loadRecycleBin());
}

// ── Misc ────────────────────────────────────────────────────────
function sendReply(f) {
    const inp = document.getElementById(`reply-${f}`);
    const val = inp.value.trim();
    if(!val) return;
    const now = new Date().toISOString();
    let msgs = allF[f].msgs || [];
    msgs.push({time:now, user:"Admin", status:val, read:false});
    db.ref('flights/'+f+'/msgs').set(msgs).then(()=>inp.value="");
}

function markReadAdmin(f, idx) { db.ref('flights/'+f+'/msgs/'+idx+'/read').set(true); }
function toggleAllLogs() { allOpen = !allOpen; renderList(); }
function toggleTZ() { useUTC = !useUTC; document.getElementById('tzBtn').innerText = useUTC?"UTC":"Local"; renderList(); }

// FIX: Theme persisted in localStorage
function toggleTheme() {
    const t = document.body.getAttribute('data-theme')==='dark'?'light':'dark';
    document.body.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
}

window.onload = () => {
    // FIX: Restore saved theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    render();
};
</script>
</body>
</html>
