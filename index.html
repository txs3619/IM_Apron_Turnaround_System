<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apron System - Staff</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
  :root{--bg:#f0f2f5;--card:#fff;--text:#333;--border:#ddd;--primary:#1a237e;--accent:#007bff;}
  [data-theme='dark']{--bg:#0b1117;--card:#161b22;--text:#c9d1d9;--border:#30363d;--primary:#58a6ff;--accent:#1f6feb;}
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);margin:0;padding-bottom:80px;}
  .hdr{background:var(--primary);color:white;padding:9px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;gap:8px;}
  .btn{padding:6px 12px;border-radius:7px;border:none;font-weight:bold;cursor:pointer;font-size:13px;transition:opacity .15s;}
  .btn:hover{opacity:.85;}
  .btn-success{background:#238636;color:white;}
  .btn-danger{background:#da3633;color:white;}
  .btn-gray{background:#555;color:white;}
  .btn-ghost{background:rgba(255,255,255,0.15);color:white;}
  .fcard{background:var(--card);padding:12px 14px 12px 18px;margin:8px auto;border-radius:12px;border:1px solid var(--border);border-left:8px solid #888;cursor:pointer;max-width:860px;}
  .badge{background:#ffc107;color:#000;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:bold;display:inline-block;margin-bottom:5px;}
  .pill{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:bold;}
  .overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:1500;overflow-y:auto;padding:18px;}
  .fw{max-width:860px;margin:auto;}
  .iw{margin-bottom:10px;}
  .iw label{font-size:11px;font-weight:bold;color:#888;display:block;margin-bottom:3px;}
  select,input,textarea{padding:9px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--text);width:100%;}
  input[type=datetime-local]{cursor:pointer;}
  .cat-sec{border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden;}
  .cat-hdr{padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;transition:background .3s;}
  .cat-hdr b{flex:1;font-size:14px;}
  .cat-body{padding:10px 14px;background:rgba(128,128,128,0.03);display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;}
  .mbox{padding:9px;border-radius:7px;margin-bottom:7px;font-size:13px;border-left:4px solid transparent;}
  .munread{border-left-color:#ffc107;background:rgba(255,193,7,0.1);}
  .mread{opacity:.7;background:rgba(128,128,128,0.05);}
  .task-strip{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;}
  .ts-chip{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}
  #profilePanel{display:none;position:fixed;top:52px;left:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;width:275px;z-index:2000;box-shadow:0 8px 28px rgba(0,0,0,0.4);}
  #profilePanel.open{display:block;}
  #profilePanel h4{margin:0 0 12px;font-size:14px;color:var(--primary);}
  .pp-row{margin-bottom:10px;}
  .pp-row label{font-size:11px;font-weight:bold;color:#888;display:block;margin-bottom:3px;}
  .pp-row input{padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:100%;}
  #liveClock{font-size:11px;font-weight:bold;letter-spacing:.5px;white-space:nowrap;cursor:pointer;user-select:none;padding:4px 9px;border-radius:6px;background:rgba(255,255,255,0.13);}
  #banner{display:none;position:fixed;top:58px;left:50%;transform:translateX(-50%);background:#da3633;color:white;padding:10px 22px;border-radius:9px;font-weight:bold;font-size:13px;z-index:9999;max-width:92%;text-align:center;}
  .cd-ok{color:#3fb950;font-weight:bold;font-family:monospace;}
  .cd-warn{color:#e3b341;font-weight:bold;font-family:monospace;}
  .cd-late{color:#f85149;font-weight:bold;font-family:monospace;}
  /* Watermark at bottom */
  #wmBottom{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:18px;font-weight:bold;color:rgba(128,128,128,0.13);pointer-events:none;z-index:9999;letter-spacing:4px;white-space:nowrap;}
  /* Auto-timer display */
  .timer-box{background:rgba(128,128,128,0.1);border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .timer-val{font-size:20px;font-weight:bold;font-family:monospace;color:var(--primary);}
  .cd-box{font-size:13px;font-family:monospace;padding:4px 10px;border-radius:6px;}
</style>
</head>
<body>
<div id="banner"></div>
<div id="wmBottom"></div>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;inset:0;background:#1a237e;z-index:5000;display:flex;align-items:center;justify-content:center;">
  <div style="background:white;padding:30px;border-radius:14px;width:90%;max-width:380px;text-align:center;">
    <h2 style="color:#1a237e;margin-bottom:20px">✈ STAFF LOGIN</h2>
    <input id="loginId" placeholder="Staff ID" style="margin-bottom:10px;padding:10px;border-radius:8px;border:1px solid #ccc;width:100%;">
    <input id="loginPass" type="password" placeholder="Password" style="margin-bottom:16px;padding:10px;border-radius:8px;border:1px solid #ccc;width:100%;">
    <button onclick="checkLogin()" style="width:100%;padding:12px;background:#1a237e;color:white;border:none;border-radius:8px;font-weight:bold;font-size:15px;cursor:pointer;">Login</button>
    <p id="loginErr" style="color:#da3633;font-size:12px;margin-top:10px;display:none"></p>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent" style="display:none">
  <div class="hdr">
    <span id="userDisplay" style="font-weight:bold;font-size:13px;cursor:pointer;user-select:none;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis" onclick="toggleProfile()">...</span>
    <div style="flex:1;display:flex;justify-content:center"><span id="liveClock" onclick="toggleTZ()" title="Tap to switch UTC/Local">--</span></div>
    <div style="display:flex;gap:6px;align-items:center">
      <button onclick="toggleTheme()" class="btn btn-ghost" style="font-size:16px;padding:4px 8px">🌓</button>
      <button onclick="logout()" class="btn btn-danger" style="font-size:12px;padding:5px 10px">Logout</button>
    </div>
  </div>

  <!-- Profile panel top-left -->
  <div id="profilePanel">
    <h4>👤 My Profile</h4>
    <div class="pp-row"><label>Staff ID</label><input id="ppId" disabled style="opacity:.5;cursor:not-allowed"></div>
    <div class="pp-row"><label>Full Name</label><input id="ppName"></div>
    <div class="pp-row"><label>Position / Role</label><input id="ppPos"></div>
    <div class="pp-row"><label>New Password <span style="font-weight:normal;color:#888">(blank=keep)</span></label><input id="ppPass" type="password"></div>
    <div class="pp-row"><label>Confirm Password</label><input id="ppPassC" type="password"></div>
    <button onclick="saveProfile()" class="btn btn-success" style="width:100%;margin-bottom:7px">💾 Save</button>
    <p id="ppMsg" style="font-size:12px;margin:3px 0 8px;display:none"></p>
    <button onclick="toggleProfile()" class="btn btn-gray" style="width:100%;font-size:12px">Close</button>
  </div>

  <div style="max-width:860px;margin:16px auto;padding:0 14px">
    <!-- Search + Sort bar -->
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <input id="search" placeholder="Search Flight / Apron..." onkeyup="renderFlights()" style="flex:1;min-width:140px">
      <select id="sortField" onchange="renderFlights()" style="width:auto;padding:8px 10px">
        <option value="default">Default</option>
        <option value="name">Flight Name</option>
        <option value="apron">Apron</option>
        <option value="etd">ETD</option>
        <option value="status">Status</option>
      </select>
      <select id="sortDir" onchange="renderFlights()" style="width:auto;padding:8px 10px">
        <option value="asc">▲</option>
        <option value="desc">▼</option>
      </select>
      <button onclick="openAddModal()" class="btn btn-success">+ Flight</button>
    </div>
    <div id="list">Loading...</div>
  </div>
</div>

<!-- EDITOR OVERLAY -->
<div id="editorOverlay" class="overlay">
  <div class="fw">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 id="editTitle" style="margin:0;font-size:17px">Update</h2>
      <button onclick="closeEditor()" class="btn btn-gray">✕ Close</button>
    </div>
    <!-- Auto-timer display -->
    <div class="timer-box" id="timerBox" style="display:none">
      <div>
        <div style="font-size:10px;color:#888;margin-bottom:2px">⏱ Ground Time</div>
        <span class="timer-val" id="timerDisplay">00:00:00</span>
      </div>
      <div id="cdBoxWrap" style="display:none">
        <div style="font-size:10px;color:#888;margin-bottom:2px">⏳ ETD</div>
        <span id="cdBox" class="cd-box cd-ok">--:--</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px">
      <div class="iw"><label>Overall Status</label>
        <select id="t-Overall_Status">
          <option>Arriving</option><option>On Chocked</option><option>Delayed</option>
          <option>PB Attached</option><option>Push Backed</option><option>Need Assistant</option>
        </select>
      </div>
      <div class="iw"><label>Apron</label><input id="t-Apron"></div>
      <div class="iw"><label>ETD (UTC)</label><input type="datetime-local" id="depTime" oninput="onEtdChange()"></div>
      <div class="iw"><label>ETA (UTC)</label><input type="datetime-local" id="etaTime"></div>
      <div class="iw">
        <label>AT (UTC) <span style="font-size:10px;font-weight:normal;color:#888">— auto set on sync</span></label>
        <input type="datetime-local" id="atTime" disabled style="opacity:.55;cursor:not-allowed;background:rgba(128,128,128,0.08)">
      </div>
    </div>
    <div id="taskContainer"></div>
    <div class="iw"><label>Quick Message to Admin</label><textarea id="msgInput" placeholder="Type a message..." rows="2"></textarea></div>
    <button onclick="confirmUpdate()" class="btn btn-success" style="width:100%;height:46px;margin-bottom:18px;font-size:15px">☁ SYNC TO CLOUD</button>
    <details id="msgCollapse" open style="margin-bottom:10px">
      <summary style="cursor:pointer;font-weight:bold;padding:9px 12px;background:rgba(128,128,128,0.1);border-radius:7px">💬 Messages</summary>
      <div id="msgLogArea" style="padding:8px 0"></div>
    </details>
    <details id="actCollapse">
      <summary style="cursor:pointer;font-weight:bold;padding:9px 12px;background:rgba(128,128,128,0.1);border-radius:7px">⚙️ Activity Log</summary>
      <div id="actionLogArea" style="font-size:12px;padding:8px 0"></div>
    </details>
  </div>
</div>

<!-- ADD FLIGHT MODAL -->
<div id="addModal" class="overlay">
  <div style="max-width:480px;margin:60px auto;background:var(--card);padding:22px;border-radius:13px;border:1px solid var(--border)">
    <h2 style="margin:0 0 16px">Add New Flight</h2>
    <div class="iw"><label>Flight No *</label><input id="newF" placeholder="e.g. MH123" oninput="this.value=this.value.toUpperCase()"></div>
    <div class="iw"><label>Apron No *</label><input id="newA" placeholder="e.g. A12" oninput="this.value=this.value.toUpperCase()"></div>
    <div class="iw"><label>ETA (UTC) <span style="font-weight:normal;color:#888">optional</span></label><input type="datetime-local" id="newETA"></div>
    <div class="iw"><label>ETD (UTC) <span style="font-weight:normal;color:#888">optional</span></label><input type="datetime-local" id="newETD"></div>
    <p id="addErr" style="color:#da3633;font-size:12px;margin-bottom:10px;display:none"></p>
    <button onclick="saveNewFlight()" class="btn btn-success" style="width:100%;margin-bottom:8px">Create</button>
    <button onclick="document.getElementById('addModal').style.display='none'" class="btn btn-gray" style="width:100%">Cancel</button>
  </div>
</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyBNcUXtBufxeST6EzJEa2Me562cdkzBJMM",
  authDomain:"im-apron-turnaround-system.firebaseapp.com",
  databaseURL:"https://im-apron-turnaround-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"im-apron-turnaround-system",
  storageBucket:"im-apron-turnaround-system.firebasestorage.app",
  messagingSenderId:"984848540764",
  appId:"1:984848540764:web:4a54026553c971acb33299"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const CATS={
  "Admin":  {emoji:"🛫",tasks:["Cockpit","Flight Plan","NOTAM/ATIS"]},
  "Cabin":  {emoji:"🧹",tasks:["Cleaning (F/B)","Cleaning (E)","Catering (F/B)","Catering (E)"]},
  "Ground": {emoji:"🚛",tasks:["Baggage (F)","Baggage (R)","Cargo (F)","Cargo (R)","Galley","Fuel","Water","Lavatory"]}
};
const ALL_TASKS=Object.values(CATS).flatMap(c=>c.tasks);
const TASK_STATUSES=["Not Started","In Progress","Completed","Delayed","Need Assistant"];
// Status priority for cat auto-calc: higher index = higher priority
const STATUS_PRIORITY=["Completed","In Progress","Not Started","Delayed","Need Assistant"];

let currentF=null, allFlights={}, useUTC=true, listenerOn=false, currentUser=null, clockInterval=null;
let timerInterval=null, cdInterval=null, etdManuallyChanged=false;

function pad(n){return String(n).padStart(2,'0');}

// ── Theme ───────────────────────────────────────────────────────
function applyTheme(t){document.body.setAttribute('data-theme',t);localStorage.setItem('theme',t);}
function toggleTheme(){applyTheme(document.body.getAttribute('data-theme')==='dark'?'light':'dark');}

// ── Formatting ──────────────────────────────────────────────────
function formatDate(iso){
  if(!iso)return '-';
  const d=new Date(iso);
  if(useUTC)return [d.getUTCFullYear(),pad(d.getUTCMonth()+1),pad(d.getUTCDate())].join('-')+' '+[pad(d.getUTCHours()),pad(d.getUTCMinutes()),pad(d.getUTCSeconds())].join(':');
  return d.toLocaleString();
}

// ── Colours ─────────────────────────────────────────────────────
function overallBorderColor(s){
  const m={'Arriving':'#888','On Chocked':'#222','Delayed':'#da3633','PB Attached':'#1f6feb','Push Backed':'#238636','Need Assistant':'#e3b341'};
  return m[s]||'#888';
}
function chipStyle(s){
  if(s==='Completed')      return 'background:rgba(35,134,54,0.2);color:#3fb950';
  if(s==='Delayed')        return 'background:rgba(218,54,51,0.2);color:#f85149';
  if(s==='Need Assistant') return 'background:rgba(225,183,64,0.25);color:#e3b341';
  if(s==='In Progress')    return 'background:rgba(31,111,235,0.2);color:#58a6ff';
  return 'background:rgba(128,128,128,0.12);color:#888';
}
function catBgStyle(s){
  if(s==='Completed')      return 'rgba(35,134,54,0.1)';
  if(s==='Delayed')        return 'rgba(218,54,51,0.08)';
  if(s==='Need Assistant') return 'rgba(225,183,64,0.12)';
  if(s==='In Progress')    return 'rgba(31,111,235,0.08)';
  return 'rgba(128,128,128,0.04)';
}

// ── Cat status auto-calc (priority: NA>DL>NS>IP>OK) ──────────
function calcCatStatus(d,ck){
  const tasks=CATS[ck].tasks;
  const statuses=tasks.map(t=>d[t]||'Not Started');
  for(const s of['Need Assistant','Delayed','Not Started','In Progress','Completed']){
    if(statuses.includes(s)) return s;
  }
  return 'Not Started';
}

// ── Clock ───────────────────────────────────────────────────────
function updateClock(){
  const el=document.getElementById('liveClock');if(!el)return;
  const now=new Date();
  if(useUTC) el.innerText=[now.getUTCFullYear(),pad(now.getUTCMonth()+1),pad(now.getUTCDate())].join('-')+' '+[pad(now.getUTCHours()),pad(now.getUTCMinutes()),pad(now.getUTCSeconds())].join(':')+'  UTC';
  else el.innerText=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds())+'  Local';
}
function startClock(){updateClock();if(clockInterval)clearInterval(clockInterval);clockInterval=setInterval(updateClock,1000);}

// ── Ground timer (auto, starts when status leaves Arriving) ──
function startGroundTimer(startISO){
  clearInterval(timerInterval);
  if(!startISO){document.getElementById('timerBox').style.display='none';return;}
  document.getElementById('timerBox').style.display='flex';
  function tick(){
    const elapsed=Date.now()-new Date(startISO).getTime();
    const s=Math.floor(elapsed/1000)%60,m=Math.floor(elapsed/60000)%60,h=Math.floor(elapsed/3600000);
    document.getElementById('timerDisplay').innerText=pad(h)+':'+pad(m)+':'+pad(s);
  }
  tick(); timerInterval=setInterval(tick,1000);
}

// ── ETD countdown (inside editor) ───────────────────────────────
function startEditorCountdown(etdVal){
  clearInterval(cdInterval);
  const wrap=document.getElementById('cdBoxWrap');
  if(!etdVal){wrap.style.display='none';return;}
  wrap.style.display='block';
  function tick(){
    const diff=new Date(etdVal)-new Date();
    const el=document.getElementById('cdBox');
    const abs=Math.abs(diff),s=Math.floor(abs/1000)%60,m=Math.floor(abs/60000)%60,h=Math.floor(abs/3600000);
    const str=h?pad(h)+':'+pad(m)+':'+pad(s):pad(m)+':'+pad(s);
    if(diff<0){el.innerText='-'+str+' OVERDUE';el.className='cd-box cd-late';}
    else if(diff<1800000){el.innerText='⚠ '+str;el.className='cd-box cd-warn';}
    else{el.innerText='▶ '+str;el.className='cd-box cd-ok';}
  }
  tick();cdInterval=setInterval(tick,1000);
}
function onEtdChange(){etdManuallyChanged=true;startEditorCountdown(document.getElementById('depTime').value);}

// ── Login ────────────────────────────────────────────────────────
function checkLogin(){
  const id=document.getElementById('loginId').value.trim(),pass=document.getElementById('loginPass').value;
  if(!id||!pass){showLoginErr('Please enter ID and password.');return;}
  db.ref('users/'+id).once('value',s=>{
    const u=s.val();
    if(u&&u.pass===pass){sessionStorage.setItem('user',JSON.stringify(u));currentUser=u;init();}
    else showLoginErr('Invalid credentials.');
  });
}
function showLoginErr(m){const e=document.getElementById('loginErr');e.innerText=m;e.style.display='block';}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')checkLogin();});

// ── Init ─────────────────────────────────────────────────────────
function init(){
  currentUser=JSON.parse(sessionStorage.getItem('user'));
  if(!currentUser)return;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainContent').style.display='block';
  document.getElementById('userDisplay').innerText='👤 '+currentUser.name;
  document.getElementById('wmBottom').innerText=currentUser.id;
  startClock();
  if(!listenerOn){
    listenerOn=true;
    db.ref('flights').on('value',s=>{
      const raw=s.val()||{};
      if(currentF&&raw[currentF]&&raw[currentF]._deleted){closeEditor();showBanner('⚠️ Flight '+currentF+' was removed by Admin.');}
      allFlights={};
      for(let f in raw){if(!raw[f]._deleted)allFlights[f]=raw[f];}
      renderFlights();
      if(currentF&&allFlights[currentF])renderLogs(allFlights[currentF]);
    });
  }
}

// ── Profile ──────────────────────────────────────────────────────
function toggleProfile(){
  const p=document.getElementById('profilePanel');
  if(p.classList.contains('open')){p.classList.remove('open');return;}
  document.getElementById('ppId').value=currentUser.id||'';
  document.getElementById('ppName').value=currentUser.name||'';
  document.getElementById('ppPos').value=currentUser.pos||'';
  document.getElementById('ppPass').value='';
  document.getElementById('ppPassC').value='';
  document.getElementById('ppMsg').style.display='none';
  p.classList.add('open');
}
document.addEventListener('click',e=>{
  const p=document.getElementById('profilePanel'),ud=document.getElementById('userDisplay');
  if(p&&p.classList.contains('open')&&!p.contains(e.target)&&!ud.contains(e.target))p.classList.remove('open');
});
function saveProfile(){
  const name=document.getElementById('ppName').value.trim(),pos=document.getElementById('ppPos').value.trim();
  const pass=document.getElementById('ppPass').value,passC=document.getElementById('ppPassC').value;
  if(!name||!pos){showPpMsg('Name and Position required.',true);return;}
  if(pass&&pass!==passC){showPpMsg('Passwords do not match.',true);return;}
  const upd={name,pos};if(pass)upd.pass=pass;
  db.ref('users/'+currentUser.id).update(upd).then(()=>{
    currentUser={...currentUser,...upd};
    sessionStorage.setItem('user',JSON.stringify(currentUser));
    document.getElementById('userDisplay').innerText='👤 '+currentUser.name;
    showPpMsg('✅ Profile updated!');
    document.getElementById('ppPass').value='';
    document.getElementById('ppPassC').value='';
  }).catch(e=>showPpMsg('❌ '+e.message,true));
}
function showPpMsg(m,err){const el=document.getElementById('ppMsg');el.style.display='block';el.style.color=err?'#da3633':'#3fb950';el.innerText=m;}

// ── Countdown string (plain text, no HTML) ──────────────────────
function countdownPlain(refVal){
  const diff=new Date(refVal)-new Date();
  const abs=Math.abs(diff),s=Math.floor(abs/1000)%60,m=Math.floor(abs/60000)%60,h=Math.floor(abs/3600000);
  const str=(h?pad(h)+':':'')+pad(m)+':'+pad(s);
  if(diff<0)return{text:'-'+str+' OVERDUE',cls:'cd-late'};
  if(diff<1800000)return{text:'⚠ '+str,cls:'cd-warn'};
  return{text:'▶ '+str,cls:'cd-ok'};
}

// ── Sort helper ──────────────────────────────────────────────────
const ST_ORD={'Arriving':0,'On Chocked':1,'Delayed':2,'PB Attached':3,'Push Backed':4,'Need Assistant':5};
function sortedKeys(){
  const field=document.getElementById('sortField')?.value||'default';
  const dir=document.getElementById('sortDir')?.value==='desc'?-1:1;
  let keys=Object.keys(allFlights);
  if(field==='default')return keys;
  return keys.sort((a,b)=>{
    const da=allFlights[a],db2=allFlights[b];
    let va,vb;
    if(field==='name'){va=a;vb=b;}
    else if(field==='apron'){va=da.apron||'';vb=db2.apron||'';}
    else if(field==='etd'){va=da.etd||'';vb=db2.etd||'';}
    else if(field==='status'){va=ST_ORD[da['Overall Status']]??9;vb=ST_ORD[db2['Overall Status']]??9;}
    if(typeof va==='number')return(va-vb)*dir;
    return va.localeCompare(vb)*dir;
  });
}

// ── Flight list render ───────────────────────────────────────────
function renderFlights(){
  const q=(document.getElementById('search').value||'').toUpperCase();
  const list=document.getElementById('list');list.innerHTML='';
  clearInterval(window._cardCdInterval);
  const keys=sortedKeys();
  if(!keys.length){list.innerHTML='<p style="color:#888;text-align:center;padding:30px">No active flights.</p>';return;}
  keys.forEach(f=>{
    const d=allFlights[f];
    if(q&&!f.includes(q)&&!(d.apron||'').includes(q))return;
    const unread=(d.msgs||[]).some(m=>m.user==='Admin'&&!m.read);
    const card=document.createElement('div');card.className='fcard';
    card.style.borderLeftColor=overallBorderColor(d['Overall Status']);
    card.onclick=()=>openEditor(f);

    // Time info row — plain text only; live countdown injected via span id
    let timeRow='';
    if(d.at){
      // Has AT: ETD | live-countdown | AT
      timeRow=`<span>ETD: ${d.etd?d.etd.substring(11,16):'-'}</span>`;
      if(d.etd) timeRow+=` <span id="cd-card-${f}">…</span>`;
      timeRow+=` <span style="color:#888">AT: ${d.at.length>=16?d.at.substring(11,16):d.at.substring(11,16)}</span>`;
    } else if(d.etd){
      // Has ETD but no AT
      timeRow=`<span>ETD: ${d.etd.substring(11,16)}</span> <span id="cd-card-${f}">…</span>`;
    } else if(d.eta){
      timeRow=`<span>ETA: ${d.eta.substring(11,16)}</span>`;
    }

    // Cat chips (non-NS only)
    const catChips=Object.keys(CATS).map(ck=>{
      const s=d['cat_'+ck]||calcCatStatus(d,ck);if(s==='Not Started')return'';
      return`<span class="ts-chip" style="${chipStyle(s)}">${CATS[ck].emoji}${ck}: ${s}</span>`;
    }).filter(Boolean).join('');
    const taskChips=ALL_TASKS.map(t=>{
      const sv=d[t]||'Not Started';if(sv==='Not Started')return'';
      const short=t.replace(' (F/B)','(FB)').replace(' (F)','(F)').replace(' (R)','(R)').replace(' (E)','(E)');
      return`<span class="ts-chip" style="${chipStyle(sv)}">${short}</span>`;
    }).filter(Boolean).join('');
    const strip=[catChips,taskChips].filter(Boolean).join('');

    card.innerHTML=`
      ${unread?`<div class="badge">💬 NEW MSG FROM ADMIN</div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><b style="font-size:15px">${f}</b> <span style="color:#888;font-size:12px">Apron ${d.apron}</span></div>
        <span class="pill" style="${chipStyle(d['Overall Status']||'')}">${d['Overall Status']||'—'}</span>
      </div>
      ${timeRow?`<div style="font-size:12px;color:#888;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">${timeRow}</div>`:''}
      ${strip?`<div class="task-strip">${strip}</div>`:''}`;
    list.appendChild(card);
  });
  // Initialise countdowns immediately (so first render shows value, not "…")
  Object.keys(allFlights).forEach(f=>{
    const d=allFlights[f]; const refVal=d.etd||'';
    const el=document.getElementById('cd-card-'+f);
    if(el&&refVal){const r=countdownPlain(refVal);el.innerText=r.text;el.className=r.cls;}
  });
  // Live countdown refresh on cards - update text and colour class directly
  clearInterval(window._cardCdInterval);
  window._cardCdInterval=setInterval(()=>{
    Object.keys(allFlights).forEach(f=>{
      const d=allFlights[f];
      const refVal=d.etd||'';
      const el=document.getElementById('cd-card-'+f);
      if(el&&refVal){
        const r=countdownPlain(refVal);
        el.innerText=r.text;
        el.className=r.cls;
      }
    });
  },1000);
}

// ── Editor open ──────────────────────────────────────────────────
function openEditor(f){
  currentF=f;const d=allFlights[f];
  document.getElementById('editTitle').innerText='✈ '+f+' — Apron '+d.apron;
  document.getElementById('t-Overall_Status').value=d['Overall Status']||'Arriving';
  document.getElementById('t-Apron').value=d.apron||'';
  document.getElementById('depTime').value=d.etd||'';
  document.getElementById('etaTime').value=d.eta||'';
  document.getElementById('atTime').value=d.at||'';
  etdManuallyChanged=false;
  startGroundTimer(d.timerStart||null);
  startEditorCountdown(d.etd||'');

  // Build task sections — cat status is auto-calculated, not shown as dropdown
  let h='';
  for(const ck in CATS){
    const cat=CATS[ck];const catStatus=calcCatStatus(d,ck);
    h+=`<div class="cat-sec"><div class="cat-hdr" style="background:${catBgStyle(catStatus)}">
      <b>${cat.emoji} ${ck}</b>
      <span class="ts-chip" style="${chipStyle(catStatus)};font-size:12px;padding:3px 10px">${catStatus}</span>
    </div><div class="cat-body">`;
    cat.tasks.forEach(t=>{
      const val=d[t]||'Not Started',tid='t-'+t.replace(/[\s()/]/g,'_');
      h+=`<div class="iw" style="margin-bottom:6px"><label style="font-size:11px;color:#888">${t}</label>
        <select id="${tid}" style="font-size:12px;padding:6px 8px">
          ${TASK_STATUSES.map(s=>`<option${val===s?' selected':''}>${s}</option>`).join('')}
        </select></div>`;
    });
    h+=`</div></div>`;
  }
  document.getElementById('taskContainer').innerHTML=h;
  renderLogs(d);
  document.getElementById('editorOverlay').style.display='block';
}

// ── Sync to cloud ────────────────────────────────────────────────
function confirmUpdate(){
  const u=currentUser,now=new Date().toISOString(),d=allFlights[currentF];
  let updates={},newLogs=[],msgs=d.msgs||[],changed=false,summary=[];

  const check=(elId,key,label)=>{
    const el=document.getElementById(elId);if(!el)return;
    const v=el.value,old=d[key]||'';
    if(old===v||v==='Not Started')return;
    // Always log all changes
    newLogs.push({time:now,task:label,status:v,user:u.name});
    updates[key]=v;summary.push(label+': '+(old||'—')+' → '+v);changed=true;
  };

  check('t-Overall_Status','Overall Status','Overall Status');
  check('t-Apron','apron','Apron');
  check('depTime','etd','ETD');
  check('etaTime','eta','ETA');
  // AT is NOT manually editable — skip check for atTime

  // Sub-tasks (always log, including first-time)
  ALL_TASKS.forEach(t=>check('t-'+t.replace(/[\s()/]/g,'_'),t,t));

  const msg=document.getElementById('msgInput').value.trim();
  if(msg){msgs.push({time:now,user:u.name,status:msg,read:false});updates.msgs=msgs;summary.push('Message sent');changed=true;}

  if(!changed){alert('No changes detected.');return;}

  // ── Auto-timer: start if first time leaving Arriving ─────────
  const newStatus=document.getElementById('t-Overall_Status').value;
  const wasArriving=(d['Overall Status']||'Arriving')==='Arriving';
  const isLeaving=newStatus!=='Arriving';
  if(wasArriving&&isLeaving&&!d.timerStart){
    updates.timerStart=now;
    newLogs.push({time:now,task:'Ground Timer',status:'Started',user:u.name});
    summary.push('Ground timer started');
  }

  // ── AT: auto-set if first time status leaves Arriving (if not already set) ─
  if(wasArriving&&isLeaving&&!d.at){
    updates.at=now;
    newLogs.push({time:now,task:'AT',status:'Auto-set: '+now.substring(11,16),user:'System'});
    summary.push('AT auto-set to now');
  }

  // ── ETD: default AT+90min if not manually changed and no existing ETD ─
  const currentEtd=document.getElementById('depTime').value;
  if(!etdManuallyChanged&&!d.etd&&(updates.at||d.at)){
    const atVal=updates.at||d.at;
    const etdAuto=new Date(new Date(atVal).getTime()+90*60000);
    const etdStr=etdAuto.getFullYear()+'-'+pad(etdAuto.getMonth()+1)+'-'+pad(etdAuto.getDate())+'T'+pad(etdAuto.getHours())+':'+pad(etdAuto.getMinutes());
    updates.etd=etdStr;
    newLogs.push({time:now,task:'ETD',status:'Auto: AT+90min ('+etdStr+')',user:'System'});
    summary.push('ETD auto-set to AT+90min');
    // Start countdown with new ETD
    setTimeout(()=>startEditorCountdown(etdStr),500);
  }

  // Cat statuses: recalculate based on new sub-task values (merged with existing)
  const merged={...d,...updates};
  for(const ck in CATS){
    const auto=calcCatStatus(merged,ck);
    if((d['cat_'+ck]||'Not Started')!==auto){
      updates['cat_'+ck]=auto;
      newLogs.push({time:now,task:ck+' Section',status:auto,user:'System (auto)'});
    }
  }

  if(!confirm('Confirm sync?\n'+summary.join('\n')))return;
  updates.logs=[...(d.logs||[]),...newLogs];
  db.ref('flights/'+currentF).update(updates).then(()=>{
    document.getElementById('msgInput').value='';
    etdManuallyChanged=false;
    // Refresh timer & countdown with updated data
    if(updates.timerStart)startGroundTimer(updates.timerStart);
    if(updates.etd)startEditorCountdown(updates.etd);
  });
}

function renderLogs(d){
  if(!d)return;
  const msgs=(d.msgs||[]).slice().reverse(),logs=(d.logs||[]).slice().reverse();
  document.getElementById('msgLogArea').innerHTML=msgs.map((m,i)=>{
    const oi=d.msgs.length-1-i;
    const btn=(m.user==='Admin'&&!m.read)?`<button onclick="markReadStaff(${oi})" style="float:right;font-size:10px;padding:2px 6px;background:#1f6feb;color:white;border:none;border-radius:4px;cursor:pointer">Mark Read</button>`:'';
    return`<div class="mbox ${m.read?'mread':'munread'}">${btn}<b>${m.user}</b> <small style="color:#888">${formatDate(m.time)}</small><br>${m.status}</div>`;
  }).join('')||'<p style="color:#888;font-size:13px">No messages.</p>';
  document.getElementById('actionLogArea').innerHTML=logs.map(l=>`<div style="margin-bottom:3px;font-size:12px">[${formatDate(l.time)}] <b>${l.task}</b> → ${l.status} <span style="color:#888">(${l.user})</span></div>`).join('')||'<p style="color:#888;font-size:13px">No activity.</p>';
}
function markReadStaff(idx){db.ref('flights/'+currentF+'/msgs/'+idx+'/read').set(true);}
function closeEditor(){
  currentF=null;clearInterval(timerInterval);clearInterval(cdInterval);
  document.getElementById('editorOverlay').style.display='none';
}

// ── Add flight ───────────────────────────────────────────────────
function openAddModal(){
  document.getElementById('addErr').style.display='none';
  ['newF','newA','newETA','newETD'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('addModal').style.display='block';
}
function saveNewFlight(){
  const f=document.getElementById('newF').value.trim().toUpperCase();
  const a=document.getElementById('newA').value.trim().toUpperCase();
  const eta=document.getElementById('newETA').value;
  const etd=document.getElementById('newETD').value;
  const errEl=document.getElementById('addErr');errEl.style.display='none';
  if(!f||!a){errEl.innerText='Flight No and Apron are required.';errEl.style.display='block';return;}
  if(allFlights[f]){errEl.innerText='Flight "'+f+'" already exists.';errEl.style.display='block';return;}
  const taken=Object.entries(allFlights).find(([,d])=>(d.apron||'').toUpperCase()===a);
  if(taken&&!confirm('⚠️ Apron "'+a+'" occupied by '+taken[0]+'. Proceed?'))return;
  const data={apron:a,'Overall Status':'Arriving',logs:[{time:new Date().toISOString(),task:'Flight Created',status:'Created by '+currentUser.name,user:currentUser.name}],msgs:[]};
  if(eta)data.eta=eta;
  if(etd)data.etd=etd;
  db.ref('flights/'+f).set(data).then(()=>document.getElementById('addModal').style.display='none');
}

function showBanner(msg){const b=document.getElementById('banner');b.innerText=msg;b.style.display='block';clearTimeout(b._t);b._t=setTimeout(()=>b.style.display='none',5500);}
function toggleTZ(){useUTC=!useUTC;updateClock();renderFlights();if(currentF&&allFlights[currentF])renderLogs(allFlights[currentF]);}
function logout(){sessionStorage.clear();location.reload();}

window.onload=()=>{
  applyTheme(localStorage.getItem('theme')||'light');
  if(sessionStorage.getItem('user'))init();
};
</script>
