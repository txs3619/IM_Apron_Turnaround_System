<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apron Dashboard - Admin Console</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
  :root { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; }
  [data-theme='light'] { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; transition: 0.3s; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 1000; }
  .btn { padding: 8px 14px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; margin-left: 5px; }
  .btn-primary { background: #1f6feb; color: white; }
  .btn-settings { background: #6e7681; color: white; }
  .card { background: var(--card); border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid var(--border); }
  .msg-alert { background: rgba(255,193,7,0.15); border-left: 4px solid #ffc107; padding: 10px; margin-top: 10px; font-size: 13px; border-radius: 4px; position: relative; }
  .dash-input { width: 100%; margin-top: 10px; display: flex; gap: 5px; }
  .dash-input input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; padding: 20px; overflow-y: auto; }
  .setting-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .unread-badge { background: #da3633; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; margin-left: 5px; }
</style>
</head>
<body data-theme="dark">

<div class="header">
    <h2>Admin Dashboard</h2>
    <div style="display:flex; align-items:center">
        <input id="search" placeholder="Search..." onkeyup="render()" style="padding:8px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); margin-right:10px">
        <button id="tzBtn" onclick="toggleTZ()" class="btn btn-primary">UTC</button>
        <button onclick="document.getElementById('settingsModal').style.display='block'" class="btn btn-settings">⚙️ Settings</button>
    </div>
</div>

<div id="list"></div>

<div id="settingsModal" class="overlay">
    <div style="background:var(--card); max-width:500px; margin:50px auto; padding:20px; border-radius:12px">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h3>System Settings</h3>
            <button onclick="document.getElementById('settingsModal').style.display='none'" class="btn">✕</button>
        </div>
        <div class="setting-item"><span>Display Mode</span><button onclick="toggleTheme()" class="btn">🌓 Toggle Theme</button></div>
        <div class="setting-item"><span>Log Management</span><button onclick="toggleAllLogs()" class="btn btn-primary">↔️ Expand/Collapse All Logs</button></div>
        <div class="setting-item"><span>Data Recovery</span><button onclick="document.getElementById('binModal').style.display='block'; renderBin();" class="btn">🗑️ View Recycle Bin</button></div>
        <div class="setting-item"><span>User Control</span><button onclick="document.getElementById('userModal').style.display='block'; loadUsers();" class="btn">👥 Manage Users</button></div>
    </div>
</div>

<div id="binModal" class="overlay">...</div> 
<div id="userModal" class="overlay">...</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNcUXtBufxeST6EzJEa2Me562cdkzBJMM",
  authDomain: "im-apron-turnaround-system.firebaseapp.com",
  databaseURL: "https://im-apron-turnaround-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "im-apron-turnaround-system",
  storageBucket: "im-apron-turnaround-system.firebasestorage.app",
  messagingSenderId: "984848540764",
  appId: "1:984848540764:web:4a54026553c971acb33299"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let allF = {}, useUTC = true, allLogsOpen = false;

function formatDate(isoStr) {
    if(!isoStr) return "-";
    const d = new Date(isoStr);
    const pad = (n) => String(n).padStart(2,'0');
    if(useUTC) return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;
    return d.toLocaleString();
}

function render() {
    db.ref('flights').on('value', s => {
        allF = s.val() || {};
        const q = document.getElementById("search").value.toUpperCase();
        const list = document.getElementById("list"); list.innerHTML = "";
        for(let f in allF) {
            const d = allF[f];
            if(!f.includes(q) && !d.apron.includes(q)) continue;
            const logs = d.logs || [];
            const msgs = logs.map((l,i)=>({...l, idx:i})).filter(l => l.task === "Message").reverse();
            const acts = logs.filter(l => l.task !== "Message").reverse();
            const unreadCount = msgs.filter(m => m.user !== "Admin" && !m.read).length;

            const card = document.createElement("div"); card.className = "card";
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <b>${f} (Apron: ${d.apron})</b>
                    <div>
                        ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount} NEW</span>` : ""}
                        <span style="font-size:12px; color:var(--primary)">${d['Overall Status']}</span>
                    </div>
                </div>
                <div class="dash-input">
                    <input id="msg-${f}" placeholder="Send message to staff...">
                    <button onclick="sendDashMsg('${f}')" class="btn btn-primary">Send</button>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:12px">
                    <details class="f-log"><summary style="cursor:pointer; color:#ffc107">💬 Messages (${msgs.length})</summary>
                        <div style="max-height:200px; overflow-y:auto; padding:5px; background:rgba(0,0,0,0.2)">
                            ${msgs.map(m => `
                                <div class="msg-alert" style="${m.user!=='Admin'&&!m.read?'border-left:4px solid #da3633':''}">
                                    <b>${m.user}:</b> ${m.status} <br><small>${formatDate(m.time)}</small>
                                    ${m.user!=='Admin'&&!m.read ? `<button onclick="markRead('${f}',${m.idx})" style="float:right; scale:0.8">✔ Mark Read</button>`:''}
                                </div>`).join('')}
                        </div>
                    </details>
                    <details class="f-log"><summary style="cursor:pointer; color:var(--primary)">⚙️ Activities (${acts.length})</summary>
                        <div style="max-height:200px; overflow-y:auto; font-size:11px; padding:5px; background:rgba(0,0,0,0.2)">
                            ${acts.map(a => `<div>[${formatDate(a.time).split(' ')[1]}] ${a.user}: ${a.task}->${a.status}</div>`).join('')}
                        </div>
                    </details>
                </div>`;
            list.appendChild(card);
        }
    });
}

function markRead(f, idx) { db.ref(`flights/${f}/logs/${idx}/read`).set(true); }

function sendDashMsg(f) {
    const input = document.getElementById(`msg-${f}`);
    const msg = input.value.trim();
    if(!msg) return;
    const now = new Date().toISOString();
    let logs = allF[f].logs || [];
    logs.push({time: now, task: "Message", status: msg, user: "Admin", read: false});
    db.ref('flights/' + f + '/logs').set(logs).then(() => input.value = "");
}

function toggleAllLogs() {
    allLogsOpen = !allLogsOpen;
    document.querySelectorAll('.f-log').forEach(d => d.open = allLogsOpen);
    document.getElementById('settingsModal').style.display='none';
}

function toggleTZ() { useUTC = !useUTC; document.getElementById('tzBtn').innerText = useUTC ? "UTC" : "Local"; render(); }
function toggleTheme() { const n = document.body.getAttribute('data-theme')==='dark'?'light':'dark'; document.body.setAttribute('data-theme', n); localStorage.setItem('adminTheme', n); }
window.onload = render;
</script>
</body>
</html>
