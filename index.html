<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apron Updating System - Staff</title>
<style>
  :root { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; --accent: #007bff; --sel-bg: #ffffff; }
  [data-theme='dark'] { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; --accent: #1f6feb; --sel-bg: #21262d; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; padding-bottom: 80px; }
  .header { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
  .btn { padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: #238636; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .btn-gray { background: #666; color: white; }
  .card { background: var(--card); padding: 20px; margin: 15px auto; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; max-width: 800px; position: relative; overflow: hidden; }
  .priority-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 8px; }
  .overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1500; overflow-y: auto; padding: 20px; }
  input, select, textarea { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--sel-bg); color: var(--text); width: 100%; box-sizing: border-box; }
  .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .st-delayed { color: #da3633 !important; } .st-assistance { color: #e3b341 !important; } .st-completed { color: #2ebc7f !important; } .st-attached { color: #1f6feb !important; }
  select.sel-delayed { background-color: rgba(218, 54, 51, 0.2) !important; }
  select.sel-assistance { background-color: rgba(227, 179, 65, 0.2) !important; }
  details { margin-top: 15px; background: rgba(128,128,128,0.08); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
  .timer-box { font-family: monospace; font-size: 12px; margin-top: 6px; opacity: 0.8; }
  .log-item { padding: 6px; border-bottom: 1px solid var(--border); font-size: 13px; }
</style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; inset:0; background:var(--primary); z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:15px; width:90%; max-width:400px; text-align:center; color:#333">
        <h2>STAFF LOGIN</h2>
        <input id="loginId" placeholder="Staff ID" style="margin-bottom:10px">
        <input id="loginPass" type="password" placeholder="Password" style="margin-bottom:15px">
        <button onclick="checkLogin()" class="btn btn-primary" style="width:100%">Login</button>
    </div>
</div>

<div id="mainContent" style="display:none">
    <div class="header">
        <div onclick="openProfile()" style="cursor:pointer; font-weight:bold">👤 <span id="userDisplay">Name</span></div>
        <div style="display:flex; gap:10px">
            <button onclick="toggleTheme()" class="btn" style="background:none; font-size:18px">🌓</button>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </div>
    <div style="max-width:800px; margin:20px auto; padding:0 15px">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input id="search" placeholder="Search..." onkeyup="renderFlights()" style="flex:1">
            <button onclick="document.getElementById('addModal').style.display='block'" class="btn btn-success">+ New Flight</button>
        </div>
        <div id="list"></div>
    </div>
</div>

<div id="editorOverlay" class="overlay">
    <div style="max-width:800px; margin:auto">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h2 id="editTitle">Update Flight</h2>
            <button onclick="closeEditor()" class="btn btn-gray">✕ Close</button>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px">
            <div><label>Apron</label><input id="editA"></div>
            <div><label>Status</label><select id="t-Overall_Status" onchange="updateSelectColor(this)"><option value="Not Started">Not Started</option><option value="Attached">Attached</option><option value="Need Assistance">Need Assistance</option><option value="Delayed">Delayed</option><option value="Completed">Completed</option></select></div>
        </div>
        <div id="categoryContainer"></div>
        <textarea id="msgInput" placeholder="Message..." style="margin-top:10px"></textarea>
        <button onclick="confirmUpdate()" class="btn btn-success" style="width:100%; height:50px; margin-top:10px">SAVE CHANGES</button>
        <details open><summary>💬 Message Logs</summary><div id="msgLogArea"></div></details>
        <details><summary>⚙️ Activity Logs</summary><div id="actionLogArea"></div></details>
    </div>
</div>

<div id="profileOverlay" class="overlay">
    <div style="max-width:350px; margin:100px auto; background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--border)">
        <h3>Edit Profile</h3>
        <label>Display Name</label><input id="pName" style="margin-bottom:10px">
        <label>New Password</label><input id="pPass" type="password" style="margin-bottom:20px">
        <button onclick="saveProfile()" class="btn btn-primary" style="width:100%">Save Changes</button>
        <button onclick="document.getElementById('profileOverlay').style.display='none'" class="btn" style="width:100%; margin-top:10px">Cancel</button>
    </div>
</div>

<script>
const CATS = { "Ground": ["Fueling","Baggage","Catering"], "Admin": ["Flight Plan","Customs"] };
let currentF = null;
const STATUS_COLORS = { "Delayed": "#da3633", "Need Assistance": "#e3b341", "Attached": "#1f6feb", "Completed": "#2ebc7f", "Not Started": "#8b949e" };

function updateSelectColor(el) {
    el.style.backgroundColor = el.value === "Delayed" ? "rgba(218,54,51,0.2)" : (el.value === "Need Assistance" ? "rgba(227,179,65,0.2)" : "");
}

function checkLogin() {
    const id = document.getElementById('loginId').value;
    const users = JSON.parse(localStorage.getItem("users") || '{"admin":{"id":"admin","pass":"admin","name":"Default User"}}');
    if(users[id] && users[id].pass === document.getElementById('loginPass').value) {
        sessionStorage.setItem("user", JSON.stringify(users[id]));
        initApp();
    } else alert("Invalid");
}

function initApp() {
    const u = JSON.parse(sessionStorage.getItem("user"));
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainContent').style.display='block';
    document.getElementById('userDisplay').innerText = u.name;
    renderFlights();
}

function renderFlights() {
    const db = JSON.parse(localStorage.getItem("flights") || "{}");
    const list = document.getElementById("list"); list.innerHTML = "";
    for(let f in db) {
        const card = document.createElement("div"); card.className = "card";
        card.onclick = () => openEditor(f);
        card.innerHTML = `<div class="priority-bar" style="background:${STATUS_COLORS[db[f]['Overall Status']]}"></div>
            <div style="margin-left:12px"><b>${f}</b> (${db[f].apron}) <br> <small>${db[f]['Overall Status']}</small></div>`;
        list.appendChild(card);
    }
}

function openEditor(f) {
    currentF = f;
    const d = JSON.parse(localStorage.getItem("flights"))[f];
    document.getElementById('editTitle').innerText = f;
    document.getElementById('editA').value = d.apron;
    document.getElementById('t-Overall_Status').value = d['Overall Status'];
    let h = "";
    for(let c in CATS) {
        h += `<b>${c}</b><div class="task-grid">` + CATS[c].map(t => `<div><small>${t}</small><select id="t-${t.replace(/\s/g,'_')}"><option value="Not Started">Not Started</option><option value="Completed">Completed</option></select></div>`).join('') + `</div>`;
    }
    document.getElementById('categoryContainer').innerHTML = h;
    renderLogs(d.logs || []);
    document.getElementById('editorOverlay').style.display="block";
}

function renderLogs(logs) {
    const m = document.getElementById('msgLogArea'); const a = document.getElementById('actionLogArea');
    m.innerHTML = ""; a.innerHTML = "";
    logs.slice().reverse().forEach(l => {
        const row = `<div class="log-item"><b>${l.user}</b>: ${l.status} <small>(${l.task})</small></div>`;
        if(l.task === "Message") m.innerHTML += row; else a.innerHTML += row;
    });
}

function confirmUpdate() {
    let db = JSON.parse(localStorage.getItem("flights"));
    const u = JSON.parse(sessionStorage.getItem("user"));
    const msg = document.getElementById('msgInput').value.trim();
    if(msg) db[currentF].logs.push({time:new Date(), task:"Message", status:msg, user:u.name});
    db[currentF]['Overall Status'] = document.getElementById('t-Overall_Status').value;
    localStorage.setItem("flights", JSON.stringify(db));
    alert("Saved"); closeEditor();
}

function openProfile() {
    const u = JSON.parse(sessionStorage.getItem("user"));
    document.getElementById('pName').value = u.name;
    document.getElementById('pPass').value = u.pass;
    document.getElementById('profileOverlay').style.display = 'block';
}

function saveProfile() {
    let users = JSON.parse(localStorage.getItem("users"));
    const u = JSON.parse(sessionStorage.getItem("user"));
    users[u.id].name = document.getElementById('pName').value;
    users[u.id].pass = document.getElementById('pPass').value;
    localStorage.setItem("users", JSON.stringify(users));
    alert("Updated"); location.reload();
}

function toggleTheme() { 
    const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); 
}
function closeEditor() { document.getElementById('editorOverlay').style.display='none'; renderFlights(); }
function logout() { sessionStorage.clear(); location.reload(); }
window.onload = () => { if(sessionStorage.getItem("user")) initApp(); };
</script>
</body>
</html>
