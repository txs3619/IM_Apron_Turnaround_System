<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apron System - Staff</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
  :root { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; --accent: #007bff; --watermark: rgba(0,0,0,0.1); }
  [data-theme='dark'] { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; --accent: #1f6feb; --watermark: rgba(255,255,255,0.05); }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; padding-bottom: 80px; }
  .watermark { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: bold; color: var(--watermark); pointer-events: none; z-index: 9999; }
  .header { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
  .btn { padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: #238636; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .btn-gray { background: #666; color: white; }
  .card { background: var(--card); padding: 15px; margin: 12px auto; border-radius: 12px; border: 1px solid var(--border); border-left: 10px solid #666; cursor: pointer; max-width: 800px; position: relative; }
  .card-msg-badge { background: #ffc107; color: #000; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 8px; display: inline-block; }
  .overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1500; overflow-y: auto; padding: 20px; }
  .input-wrapper { margin-bottom: 12px; }
  .input-wrapper label { font-size: 11px; font-weight: bold; color: #888; display: block; margin-bottom: 4px; }
  input, select, textarea { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); width: 100%; box-sizing: border-box; }
  .task-section { background: rgba(128,128,128,0.05); padding: 12px; border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border); }
  .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
  .msg-box { padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; position: relative; border-left: 4px solid transparent; }
  .msg-unread { border-left-color: #ffc107; background: rgba(255,193,7,0.1); }
  .msg-read { opacity: 0.7; background: rgba(128,128,128,0.05); }
</style>
</head>
<body data-theme="light">

<div id="watermark" class="watermark"></div>

<div id="loginOverlay" style="position:fixed; inset:0; background:var(--primary); z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:15px; width:90%; max-width:400px; text-align:center;">
        <h2 style="color:#333">STAFF LOGIN</h2>
        <input id="loginId" placeholder="Staff ID">
        <input id="loginPass" type="password" placeholder="Password" style="margin-top:10px">
        <button onclick="checkLogin()" class="btn btn-primary" style="width:100%; margin-top:15px">Login</button>
    </div>
</div>

<div id="mainContent" style="display:none">
    <div class="header">
        <div id="userDisplay" style="font-weight:bold">Profile</div>
        <div style="display:flex; gap:10px">
            <button id="tzBtn" onclick="toggleTZ()" class="btn" style="background:rgba(255,255,255,0.2); color:white">UTC</button>
            <button onclick="toggleTheme()" class="btn" style="background:none; font-size:20px">🌓</button>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </div>
    <div style="max-width:800px; margin:20px auto; padding:0 15px">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input id="search" placeholder="Search Flight/Apron..." onkeyup="renderFlights()" style="flex:1">
            <button onclick="document.getElementById('addModal').style.display='block'" class="btn btn-success">+ New Flight</button>
        </div>
        <div id="list">Loading...</div>
    </div>
</div>

<div id="editorOverlay" class="overlay">
    <div style="max-width:800px; margin:auto">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h2 id="editTitle">Update</h2>
            <button onclick="closeEditor()" class="btn btn-gray">✕ Close</button>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div class="input-wrapper"><label>Overall Status</label>
                <select id="t-Overall_Status">
                    <option>Not Started</option><option>In Progress</option>
                    <option>Delayed</option><option>Completed</option><option>Required Assistance</option>
                </select>
            </div>
            <div class="input-wrapper"><label>Apron</label><input id="t-Apron"></div>
            <div class="input-wrapper"><label>ETD (UTC)</label><input type="datetime-local" id="depTime"></div>
            <div class="input-wrapper"><label>ETA (UTC)</label><input type="datetime-local" id="etaTime"></div>
            <div class="input-wrapper"><label>AT (UTC)</label><input type="datetime-local" id="atTime"></div>
        </div>

        <div id="taskContainer"></div>

        <div class="input-wrapper"><label>Quick Message</label><textarea id="msgInput" placeholder="Type a message..."></textarea></div>
        <button onclick="confirmUpdate()" class="btn btn-success" style="width:100%; height:50px; margin-bottom:20px">SYNC TO CLOUD</button>
        
        <details id="msgCollapse" open><summary style="cursor:pointer; font-weight:bold; padding:10px; background:var(--border); border-radius:5px">💬 Messages</summary><div id="msgLogArea" style="padding:10px 0"></div></details>
        <details id="actCollapse" style="margin-top:10px"><summary style="cursor:pointer; font-weight:bold; padding:10px; background:var(--border); border-radius:5px">⚙️ Activity Logs</summary><div id="actionLogArea" style="font-size:12px; padding:10px 0"></div></details>
    </div>
</div>

<div id="addModal" class="overlay">
    <div style="max-width:500px; margin:auto; background:var(--card); padding:20px; border-radius:12px; margin-top:50px">
        <h2>Add Flight</h2>
        <input id="newF" placeholder="Flight No (e.g MH123)" style="margin-bottom:10px">
        <input id="newA" placeholder="Apron No" style="margin-bottom:10px">
        <button onclick="saveNewFlight()" class="btn btn-success" style="width:100%">Create</button>
        <button onclick="document.getElementById('addModal').style.display='none'" class="btn btn-gray" style="width:100%; margin-top:10px">Cancel</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNcUXtBufxeST6EzJEa2Me562cdkzBJMM",
  authDomain: "im-apron-turnaround-system.firebaseapp.com",
  databaseURL: "https://im-apron-turnaround-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "im-apron-turnaround-system",
  storageBucket: "im-apron-turnaround-system.firebasestorage.app",
  messagingSenderId: "984848540764",
  appId: "1:984848540764:web:4a54026553c971acb33299"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const CATS = { "Admin": ["Flight Plan Approval","Engineering","Tow Truck Pushback"], "Cabin": ["PAX Boarding (F)","PAX Boarding (B)","Catering"], "Ground": ["Baggage Load","Fueling","Water","Lavatory"] };
let currentF = null, allFlights = {}, useUTC = true;

function formatDate(iso) {
    if(!iso) return "-";
    const d = new Date(iso);
    const options = { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false };
    if(useUTC) return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0')+' '+String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')+':'+String(d.getUTCSeconds()).padStart(2,'0') + " (UTC)";
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
}

function checkLogin() {
    const id = document.getElementById('loginId').value;
    const pass = document.getElementById('loginPass').value;
    db.ref('users/'+id).once('value', s => {
        const u = s.val();
        if(u && u.pass === pass) { sessionStorage.setItem("user", JSON.stringify(u)); init(); }
        else alert("Invalid Credentials");
    });
}

function init() {
    const u = JSON.parse(sessionStorage.getItem("user"));
    if(!u) return;
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainContent').style.display='block';
    document.getElementById('userDisplay').innerText = u.name + " (" + u.pos + ")";
    document.getElementById('watermark').innerText = u.id;
    db.ref('flights').on('value', s => { 
        allFlights = s.val() || {}; 
        renderFlights(); 
        if(currentF) renderLogs(allFlights[currentF]);
    });
}

function renderFlights() {
    const s = document.getElementById('search').value.toUpperCase();
    const list = document.getElementById("list"); list.innerHTML = "";
    for(let f in allFlights) {
        const d = allFlights[f];
        if(!f.includes(s) && !d.apron.includes(s)) continue;
        const unread = (d.msgs || []).some(m => m.user === "Admin" && !m.read);
        const card = document.createElement("div"); card.className = "card";
        let bc = '#666';
        if(d['Overall Status']==='Completed') bc = '#238636';
        else if(d['Overall Status']==='Delayed') bc = '#da3633';
        else if(d['Overall Status']==='Required Assistance') bc = '#f1c40f';
        card.style.borderLeftColor = bc;
        card.onclick = () => openEditor(f);
        card.innerHTML = `
            ${unread ? `<div class="card-msg-badge">NEW ADMIN MESSAGE</div>` : ""}
            <div><b>${f}</b> <span style="float:right">Apron: ${d.apron}</span></div>
            <small>Status: ${d['Overall Status']} | ETD: ${d.etd ? d.etd.substring(11,16) : '-'}</small>`;
        list.appendChild(card);
    }
}

function openEditor(f) {
    currentF = f; const d = allFlights[f];
    document.getElementById('editTitle').innerText = "Update Flight: " + f;
    document.getElementById('t-Overall_Status').value = d['Overall Status'] || 'Not Started';
    document.getElementById('t-Apron').value = d.apron;
    document.getElementById('depTime').value = d.etd || "";
    document.getElementById('etaTime').value = d.eta || "";
    document.getElementById('atTime').value = d.at || "";
    let h = "";
    for(let c in CATS) {
        h += `<div class="task-section"><h4>${c}</h4><div class="task-grid">`;
        CATS[c].forEach(t => {
            const val = d[t] || 'Not Started';
            h += `<div><label>${t}</label><select id="t-${t.replace(/\s+/g,'_')}">
                <option ${val==='Not Started'?'selected':''}>Not Started</option>
                <option ${val==='In Progress'?'selected':''}>In Progress</option>
                <option ${val==='Completed'?'selected':''}>Completed</option>
                <option ${val==='Delayed'?'selected':''}>Delayed</option>
                <option ${val==='Required Assistance'?'selected':''}>Required Assistance</option>
            </select></div>`;
        });
        h += `</div></div>`;
    }
    document.getElementById('taskContainer').innerHTML = h;
    renderLogs(d);
    document.getElementById('editorOverlay').style.display = 'block';
}

function confirmUpdate() {
    const u = JSON.parse(sessionStorage.getItem("user"));
    const now = new Date().toISOString();
    let d = allFlights[currentF];
    let updates = {}, logs = d.logs || [], msgs = d.msgs || [], changed = false, summary = [];

    const check = (id, key, label) => {
        const v = document.getElementById(id).value;
        if((d[key] || "") !== v) {
            logs.push({time:now, task:label, status:v, user:u.name});
            updates[key] = v; summary.push(`${label}: -> ${v}`); changed = true;
        }
    };

    check('t-Overall_Status', 'Overall Status', 'Overall Status');
    check('t-Apron', 'apron', 'Apron');
    check('depTime', 'etd', 'ETD');
    check('etaTime', 'eta', 'ETA');
    check('atTime', 'at', 'AT');
    Object.values(CATS).flat().forEach(t => check(`t-${t.replace(/\s+/g,'_')}`, t, t));

    const msg = document.getElementById('msgInput').value.trim();
    if(msg) { 
        msgs.push({time:now, user:u.name, status:msg, read:false}); 
        updates['msgs'] = msgs; summary.push("New Message sent"); changed = true;
    }

    if(changed) {
        if(confirm("Confirm changes?\n" + summary.join("\n"))) {
            updates['logs'] = logs;
            db.ref('flights/'+currentF).update(updates).then(() => {
                document.getElementById('msgInput').value = "";
            });
        }
    } else alert("No changes detected.");
}

function renderLogs(d) {
    const msgs = (d.msgs || []).slice().reverse();
    const logs = (d.logs || []).slice().reverse();
    
    document.getElementById('msgLogArea').innerHTML = msgs.map((m, i) => {
        const originalIdx = d.msgs.length - 1 - i;
        const markBtn = (m.user==="Admin" && !m.read) ? `<button onclick="markReadStaff(${originalIdx})" class="btn-primary" style="float:right; font-size:10px; padding:2px 5px">Mark Read</button>` : "";
        return `<div class="msg-box ${m.read?'msg-read':'msg-unread'}">${markBtn}<b>${m.user}</b> <small>${formatDate(m.time)}</small><br>${m.status}</div>`;
    }).join('');

    document.getElementById('actionLogArea').innerHTML = logs.map(l => `<div>[${formatDate(l.time)}] ${l.task} -> ${l.status} (${l.user})</div>`).join('');
}

function markReadStaff(idx) { db.ref('flights/'+currentF+'/msgs/'+idx+'/read').set(true); }
function toggleTZ() { useUTC = !useUTC; document.getElementById('tzBtn').innerText = useUTC?"UTC":"Local"; renderFlights(); if(currentF) renderLogs(allFlights[currentF]); }
function toggleTheme() { const t = document.body.getAttribute('data-theme')==='dark'?'light':'dark'; document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t); }
function saveNewFlight() {
    const f = document.getElementById('newF').value.trim().toUpperCase();
    const a = document.getElementById('newA').value.trim().toUpperCase();
    if(!f || !a) return;
    db.ref('flights/'+f).set({apron:a, 'Overall Status':'Not Started', logs:[], msgs:[]}).then(()=>{
        document.getElementById('addModal').style.display='none';
    });
}
function logout() { sessionStorage.clear(); location.reload(); }
function closeEditor() { currentF = null; document.getElementById('editorOverlay').style.display='none'; }
window.onload = () => { if(sessionStorage.getItem("user")) init(); };
</script>
</body>
</html>
