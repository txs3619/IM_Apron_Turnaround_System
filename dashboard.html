<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apron Dashboard - Admin</title>
<style>
  :root { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; --sel-bg: #21262d; }
  [data-theme='light'] { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; --sel-bg: #fff; }
  
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; padding-bottom: 60px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 1000; }
  .btn { padding: 8px 14px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
  .btn-success { background: #238636; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-gray { background: #666; color: white; }
  
  .card { background: var(--card); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid var(--border); position: relative; overflow: hidden; }
  .priority-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 8px; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; padding: 20px; overflow-y: auto; }
  
  .log-panel { background: rgba(128,128,128,0.1); margin-top: 10px; padding: 12px; border-radius: 8px; font-size: 12px; }
  .log-section { margin-bottom: 10px; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 5px; }
  .log-line { border-bottom: 1px solid var(--border); padding: 4px 0; }
  
  input { background: var(--sel-bg); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 6px; }
  
  .bin-item, .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
  .bin-actions { display: flex; gap: 10px; margin-bottom: 15px; background: rgba(128,128,128,0.1); padding: 10px; border-radius: 8px; }
</style>
</head>
<body data-theme="dark">

<div class="header">
    <div style="display:flex; gap:12px; align-items:center">
        <h2>Admin Dashboard</h2>
        <div>
            <button onclick="toggleSelectAll()" class="btn btn-primary" id="selBtn">Select All</button>
            <button onclick="bulkDel()" class="btn btn-danger" id="bDel" style="display:none">Move to Bin</button>
        </div>
        <button onclick="openRecycleBin()" class="btn btn-gray">🗑️ Recycle Bin</button>
        <button onclick="openUserMgmt()" class="btn btn-gray">👥 User Mgmt</button>
        <button onclick="document.getElementById('addFModal').style.display='block'" class="btn btn-success">+ Flight</button>
    </div>
    <div style="display:flex; gap:10px">
        <button onclick="toggleTheme()" class="btn" style="background:#444; color:white">🌓</button>
        <input id="search" placeholder="Search..." onkeyup="load()">
    </div>
</div>

<div id="list"></div>

<div id="recycleBin" class="overlay">
    <div style="background:var(--card); max-width:850px; margin:auto; padding:20px; border-radius:12px; color:var(--text); border: 1px solid var(--border)">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h3>Recycle Bin</h3>
            <button onclick="document.getElementById('recycleBin').style.display='none'" class="btn btn-danger">✕ Close</button>
        </div>
        <div class="bin-actions">
            <button onclick="toggleBinSelectAll()" class="btn btn-primary" id="binSelBtn">Select All</button>
            <button onclick="bulkRestoreBin()" class="btn btn-success">Restore Selected</button>
            <button onclick="bulkPermDelete()" class="btn btn-danger">Delete Permanently</button>
        </div>
        <div id="binList"></div>
    </div>
</div>

<div id="userMgmt" class="overlay">
    <div style="background:var(--card); max-width:600px; margin:auto; padding:20px; border-radius:12px; border: 1px solid var(--border)">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h3>User Management</h3>
            <button onclick="document.getElementById('userMgmt').style.display='none'" class="btn btn-danger">✕ Close</button>
        </div>
        <div style="background:rgba(128,128,128,0.1); padding:15px; border-radius:8px; margin:15px 0">
            <h4>Add New Staff</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr auto; gap:10px">
                <input id="un" placeholder="ID (Login)">
                <input id="up" placeholder="Password">
                <input id="u_disp" placeholder="Display Name">
                <button onclick="addUser()" class="btn btn-success">Add</button>
            </div>
        </div>
        <div id="userList"></div>
    </div>
</div>

<div id="addFModal" class="overlay">
    <div style="background:var(--card); max-width:400px; margin:100px auto; padding:25px; border-radius:12px; text-align:center; border: 1px solid var(--border)">
        <h3>New Flight</h3>
        <input id="nf" placeholder="Flight Number" style="width:100%; margin-bottom:10px"><br>
        <input id="na" placeholder="Apron" style="width:100%; margin-bottom:20px"><br>
        <button onclick="addFlight()" class="btn btn-success" style="width:100%">Confirm</button>
        <button onclick="document.getElementById('addFModal').style.display='none'" class="btn" style="width:100%; margin-top:10px">Cancel</button>
    </div>
</div>

<script>
let isAllSelected = false;
let isBinAllSelected = false;
const STATUS_COLORS = { "Delayed": "#da3633", "Need Assistance": "#e3b341", "Attached": "#1f6feb", "Completed": "#2ebc7f", "Not Started": "#8b949e" };

// --- 核心加载与航班逻辑 ---
function load() {
    const db = JSON.parse(localStorage.getItem("flights") || "{}");
    const s = document.getElementById('search').value.toUpperCase();
    const list = document.getElementById("list"); list.innerHTML = "";
    for(let f in db) {
        if(!f.includes(s) && !db[f].apron.includes(s)) continue;
        const d = db[f];
        const bar = getBarColor(d);
        const card = document.createElement("div"); card.className = "card";
        const msgLogs = (d.logs || []).filter(l => l.task === "Message").slice().reverse();
        const actLogs = (d.logs || []).filter(l => l.task !== "Message").slice().reverse();

        card.innerHTML = `
            <div class="priority-bar" style="background:${bar}"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-left:15px">
                <div><input type="checkbox" class="bulk" data-id="${f}" onchange="updateUI()"> <b>${f}</b> (${d.apron})</div>
                <div>Status: <b style="color:${STATUS_COLORS[d['Overall Status']]}">${d['Overall Status']}</b> 
                <button onclick="delF('${f}')" class="btn btn-danger" style="margin-left:10px">Move to Bin</button></div>
            </div>
            <div style="margin:10px 0 0 15px">
                <div style="display:flex; gap:10px">
                    <input id="msg-${f}" placeholder="Send message to staff..." style="flex:1">
                    <button onclick="sendMsg('${f}')" class="btn btn-primary">Send</button>
                    <button onclick="toggleLogs('${f}')" class="btn btn-gray">View Logs</button>
                </div>
                <div id="logs-${f}" class="log-panel" style="display:none">
                    <b>💬 Messages</b>
                    <div class="log-section">${msgLogs.map(l => `<div class="log-line"><b>${l.user}</b>: ${l.status}</div>`).join('') || 'None'}</div>
                    <b>⚙️ Activities</b>
                    <div class="log-section">${actLogs.map(l => `<div class="log-line"><b>${l.user}</b>: ${l.task} -> ${l.status}</div>`).join('') || 'None'}</div>
                </div>
            </div>`;
        list.appendChild(card);
    }
}

function getBarColor(f) {
    const order = ["Need Assistance", "Delayed", "Attached", "Completed", "Not Started"];
    const states = [f['Overall Status'], ...Object.values(f).filter(v => typeof v === 'string')];
    for(let s of order) { if(states.includes(s)) return STATUS_COLORS[s]; }
    return STATUS_COLORS["Not Started"];
}

function toggleLogs(f) { const el = document.getElementById(`logs-${f}`); el.style.display = el.style.display==='none'?'block':'none'; }

function sendMsg(f) {
    const inp = document.getElementById(`msg-${f}`); if(!inp.value) return;
    let db = JSON.parse(localStorage.getItem("flights"));
    db[f].logs.push({time:new Date().toISOString(), task:"Message", status:inp.value, user:"ADMIN"});
    localStorage.setItem("flights", JSON.stringify(db));
    inp.value = ""; load();
}

// --- 用户管理逻辑 (恢复部分) ---
function openUserMgmt() {
    const users = JSON.parse(localStorage.getItem("users") || '{"admin":{"id":"admin","pass":"admin","name":"Default Staff"}}');
    const list = document.getElementById("userList"); list.innerHTML = "<h4>Staff List</h4>";
    for(let id in users) {
        list.innerHTML += `<div class="user-item">
            <div><b>${users[id].name}</b> (ID: ${id}) | Pass: ${users[id].pass}</div>
            <button onclick="deleteUser('${id}')" class="btn btn-danger" ${id==='admin'?'disabled':''}>Delete</button>
        </div>`;
    }
    document.getElementById('userMgmt').style.display = 'block';
}

function addUser() {
    const id = document.getElementById('un').value.trim();
    const ps = document.getElementById('up').value.trim();
    const nm = document.getElementById('u_disp').value.trim();
    if(!id || !ps || !nm) return alert("Fill all fields");
    let users = JSON.parse(localStorage.getItem("users") || "{}");
    users[id] = {id:id, pass:ps, name:nm};
    localStorage.setItem("users", JSON.stringify(users));
    openUserMgmt();
}

function deleteUser(id) {
    if(!confirm("Delete this user?")) return;
    let users = JSON.parse(localStorage.getItem("users"));
    delete users[id];
    localStorage.setItem("users", JSON.stringify(users));
    openUserMgmt();
}

// --- 回收站与多选逻辑 (保留部分) ---
function openRecycleBin() {
    const bin = JSON.parse(localStorage.getItem("deletedFlights") || "{}");
    const list = document.getElementById("binList"); list.innerHTML = "";
    for(let f in bin) {
        list.innerHTML += `<div class="bin-item">
            <div><input type="checkbox" class="bin-bulk" data-id="${f}"> <b>${f}</b> (${bin[f].apron})</div>
            <div>
                <button onclick="restoreF('${f}')" class="btn btn-success">Restore</button>
                <button onclick="permDeleteF('${f}')" class="btn btn-danger">Delete Permanently</button>
            </div>
        </div>`;
    }
    document.getElementById('recycleBin').style.display='block';
}

function permDeleteF(f) {
    if(!confirm(`WARNING: Permanent delete ${f}?`)) return;
    let bin = JSON.parse(localStorage.getItem("deletedFlights"));
    delete bin[f]; localStorage.setItem("deletedFlights", JSON.stringify(bin));
    openRecycleBin();
}

function bulkPermDelete() {
    const checked = document.querySelectorAll('.bin-bulk:checked');
    if(!checked.length || !confirm(`Permanently delete ${checked.length} flights?`)) return;
    let bin = JSON.parse(localStorage.getItem("deletedFlights"));
    checked.forEach(c => delete bin[c.dataset.id]);
    localStorage.setItem("deletedFlights", JSON.stringify(bin));
    openRecycleBin();
}

function restoreF(f) {
    let bin = JSON.parse(localStorage.getItem("deletedFlights"));
    let db = JSON.parse(localStorage.getItem("flights") || "{}");
    db[f] = bin[f]; delete bin[f];
    localStorage.setItem("flights", JSON.stringify(db));
    localStorage.setItem("deletedFlights", JSON.stringify(bin));
    openRecycleBin(); load();
}

function bulkRestoreBin() {
    const checked = document.querySelectorAll('.bin-bulk:checked');
    if(!checked.length) return;
    let bin = JSON.parse(localStorage.getItem("deletedFlights"));
    let db = JSON.parse(localStorage.getItem("flights") || "{}");
    checked.forEach(c => { db[c.dataset.id] = bin[c.dataset.id]; delete bin[c.dataset.id]; });
    localStorage.setItem("flights", JSON.stringify(db));
    localStorage.setItem("deletedFlights", JSON.stringify(bin));
    openRecycleBin(); load();
}

function toggleBinSelectAll() {
    isBinAllSelected = !isBinAllSelected;
    document.querySelectorAll('.bin-bulk').forEach(c => c.checked = isBinAllSelected);
    document.getElementById('binSelBtn').innerText = isBinAllSelected ? "Deselect All" : "Select All";
}

function toggleSelectAll() {
    isAllSelected = !isAllSelected;
    document.querySelectorAll('.bulk').forEach(c => c.checked = isAllSelected);
    document.getElementById('selBtn').innerText = isAllSelected ? "Deselect All" : "Select All";
    updateUI();
}

function updateUI() { document.getElementById('bDel').style.display = document.querySelectorAll('.bulk:checked').length ? 'inline-block' : 'none'; }

function bulkDel() {
    const checked = document.querySelectorAll('.bulk:checked');
    if(!confirm(`Move ${checked.length} to Bin?`)) return;
    let db = JSON.parse(localStorage.getItem("flights"));
    let bin = JSON.parse(localStorage.getItem("deletedFlights") || "{}");
    checked.forEach(c => { bin[c.dataset.id] = db[c.dataset.id]; delete db[c.dataset.id]; });
    localStorage.setItem("flights", JSON.stringify(db));
    localStorage.setItem("deletedFlights", JSON.stringify(bin));
    load();
}

function delF(f) {
    if(!confirm(`Move ${f} to Bin?`)) return;
    let db = JSON.parse(localStorage.getItem("flights"));
    let bin = JSON.parse(localStorage.getItem("deletedFlights") || "{}");
    bin[f] = db[f]; delete db[f];
    localStorage.setItem("flights", JSON.stringify(db));
    localStorage.setItem("deletedFlights", JSON.stringify(bin));
    load();
}

function addFlight() {
    const f = document.getElementById('nf').value.toUpperCase(), a = document.getElementById('na').value.toUpperCase();
    if(!f || !a) return;
    let db = JSON.parse(localStorage.getItem("flights") || "{}");
    db[f] = {apron:a, 'Overall Status':'Not Started', logs:[], etd:"", eta:"", at:""};
    localStorage.setItem("flights", JSON.stringify(db));
    document.getElementById('addFModal').style.display='none'; load();
}

function toggleTheme() { 
    const nt = document.body.getAttribute('data-theme')==='light'?'dark':'light';
    document.body.setAttribute('data-theme', nt); 
}

window.onload = load;
</script>
</body>
</html>
