<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apron Admin - Cloud</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
  :root { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; }
  [data-theme='light'] { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--card); border-bottom: 1px solid var(--border); sticky; top:0; z-index:100; }
  .btn { padding: 6px 12px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
  .btn-danger { background: #da3633; color: white; }
  .card { background: var(--card); border-radius: 10px; padding: 15px; margin: 15px; border: 1px solid var(--border); }
  .bulk-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1f6feb; color: white; padding: 10px 20px; border-radius: 30px; display: none; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; padding: 20px; }
</style>
</head>
<body>

<div class="header">
    <h2>Admin Console</h2>
    <div>
        <input id="search" placeholder="Search..." onkeyup="render()">
        <button id="selBtn" onclick="toggleAll()" class="btn">Select All</button>
        <button onclick="document.getElementById('uModal').style.display='block'; loadUsers();" class="btn">Users</button>
        <button onclick="toggleTheme()" class="btn">🌓</button>
    </div>
</div>

<div id="list"></div>

<div id="bulkBar" class="bulk-bar">
    <span id="selCount">0</span> selected 
    <button onclick="bulkDel()" class="btn btn-danger" style="margin-left:10px">Delete Selected</button>
</div>

<div id="uModal" class="overlay">
    <div style="background:var(--card); max-width:600px; margin:auto; padding:20px; border-radius:10px">
        <h3>User Management</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input id="uId" placeholder="ID"> <input id="uName" placeholder="Name"> <input id="uPass" placeholder="Pass">
            <button onclick="saveU()" class="btn" style="background:#238636; color:white">Add/Update</button>
        </div>
        <div id="uList" style="max-height:300px; overflow-y:auto"></div>
        <button onclick="document.getElementById('uModal').style.display='none'" class="btn" style="width:100%; margin-top:15px">Close</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNcUXtBufxeST6EzJEa2Me562cdkzBJMM",
  authDomain: "im-apron-turnaround-system.firebaseapp.com",
  databaseURL: "https://im-apron-turnaround-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "im-apron-turnaround-system",
  storageBucket: "im-apron-turnaround-system.firebasestorage.app",
  messagingSenderId: "984848540764",
  appId: "1:984848540764:web:4a54026553c971acb33299"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let sel = false;

function applyTheme() {
    const t = localStorage.getItem('adminTheme') || 'dark';
    document.body.setAttribute('data-theme', t);
}

function render() {
    db.ref('flights').on('value', s => {
        const data = s.val() || {};
        const q = document.getElementById('search').value.toUpperCase();
        const list = document.getElementById('list'); list.innerHTML = "";
        for(let f in data) {
            if(!f.includes(q) && !data[f].apron.includes(q)) continue;
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `
                <input type="checkbox" class="cb" data-id="${f}" onchange="updateUI()">
                <b style="margin:0 10px">${f}</b> (Apron: ${data[f].apron})
                <details style="margin-top:10px; font-size:12px">
                    <summary>View Logs & Status</summary>
                    <div style="padding:10px">${(data[f].logs||[]).map(l=>`<div>${l.time.substring(11,16)} - ${l.user}: ${l.status}</div>`).join('')}</div>
                </details>
                <button onclick="delF('${f}')" class="btn btn-danger" style="float:right; margin-top:-25px">Del</button>`;
            list.appendChild(card);
        }
    });
}

function updateUI() {
    const count = document.querySelectorAll('.cb:checked').length;
    document.getElementById('selCount').innerText = count;
    document.getElementById('bulkBar').style.display = count > 0 ? 'block' : 'none';
}

function toggleAll() {
    sel = !sel;
    document.querySelectorAll('.cb').forEach(c => c.checked = sel);
    document.getElementById('selBtn').innerText = sel ? "Deselect" : "Select All";
    updateUI();
}

function bulkDel() {
    if(!confirm("Delete selected?")) return;
    document.querySelectorAll('.cb:checked').forEach(c => db.ref('flights/'+c.dataset.id).remove());
}

function delF(f) { if(confirm("Del "+f+"?")) db.ref('flights/'+f).remove(); }

function saveU() {
    const id = document.getElementById('uId').value;
    const n = document.getElementById('uName').value;
    const p = document.getElementById('uPass').value;
    if(id) db.ref('users/'+id).update({id, name:n, pass:p, pos:'Staff'});
}

function loadUsers() {
    db.ref('users').on('value', s => {
        const u = s.val() || {};
        let h = "<table>";
        for(let id in u) h += `<tr><td>${id}</td><td>${u[id].name}</td><td><button onclick="db.ref('users/${id}').remove()">Del</button></td></tr>`;
        document.getElementById('uList').innerHTML = h + "</table>";
    });
}

function toggleTheme() {
    const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', t);
    localStorage.setItem('adminTheme', t);
}

window.onload = () => { render(); applyTheme(); };
</script>
</body>
</html>
