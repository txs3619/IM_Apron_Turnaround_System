<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apron Updating System - Staff</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
  :root { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; --accent: #007bff; --watermark: rgba(0,0,0,0.15); }
  [data-theme='dark'] { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; --accent: #1f6feb; --watermark: rgba(255,255,255,0.1); }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; padding-bottom: 80px; }
  .header { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
  .btn { padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: #238636; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .btn-gray { background: #666; color: white; }
  .card { background: var(--card); padding: 20px; margin: 15px auto; border-radius: 12px; border: 1px solid var(--border); border-left: 10px solid #666; cursor: pointer; max-width: 800px; position: relative; }
  .overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1500; overflow-y: auto; padding: 20px; }
  .input-wrapper { margin-bottom: 15px; text-align: left; }
  .input-wrapper label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
  input, select, textarea { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); width: 100%; box-sizing: border-box; }
  .task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .msg-display { background: rgba(0,123,255,0.1); padding: 8px; border-radius: 5px; margin-top: 10px; font-size: 12px; border-left: 3px solid var(--accent); }
  details { margin-top: 10px; border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; }
</style>
</head>
<body data-theme="light">

<div id="loginOverlay" style="position:fixed; inset:0; background:var(--primary); z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:15px; width:90%; max-width:400px; text-align:center;">
        <h2 style="color:#333">STAFF LOGIN</h2>
        <input id="loginId" placeholder="Staff ID" style="margin-bottom:10px">
        <input id="loginPass" type="password" placeholder="Password" style="margin-bottom:15px">
        <button onclick="checkLogin()" class="btn btn-primary" style="width:100%">Login</button>
    </div>
</div>

<div id="mainContent" style="display:none">
    <div class="header">
        <div id="userDisplay" style="font-weight:bold; cursor:pointer" onclick="document.getElementById('profileOverlay').style.display='block'">Profile</div>
        <div style="display:flex; gap:10px">
            <button id="tzBtn" onclick="toggleTZ()" class="btn" style="background:rgba(255,255,255,0.2); color:white">UTC</button>
            <button onclick="toggleTheme()" class="btn" style="background:none; font-size:20px">🌓</button>
            <button onclick="logout()" class="btn btn-danger">Logout</button>
        </div>
    </div>
    <div style="max-width:800px; margin:20px auto; padding:0 15px">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input id="search" placeholder="Search Flight/Apron..." onkeyup="renderFlights()" style="flex:1">
            <button onclick="document.getElementById('addModal').style.display='block'" class="btn btn-success">+ New Flight</button>
        </div>
        <div id="list">Connecting...</div>
    </div>
</div>

<div id="profileOverlay" class="overlay">
    <div style="max-width:400px; margin:auto">
        <h2>Edit Profile</h2>
        <div class="input-wrapper"><label>Name</label><input id="pName"></div>
        <div class="input-wrapper"><label>Position</label><input id="pPos"></div>
        <button onclick="updateProfile()" class="btn btn-success" style="width:100%">Save Changes</button>
        <button onclick="document.getElementById('profileOverlay').style.display='none'" class="btn btn-gray" style="width:100%; margin-top:10px">Back</button>
    </div>
</div>

<div id="editorOverlay" class="overlay">
    <div style="max-width:800px; margin:auto">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 id="editTitle">Update</h2>
            <div>
                <button onclick="toggleAllDetails(true)" class="btn btn-primary">Expand All</button>
                <button onclick="toggleAllDetails(false)" class="btn btn-gray">Collapse All</button>
                <button onclick="closeEditor()" class="btn btn-gray">✕</button>
            </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <div class="input-wrapper"><label>Overall Status</label>
                <select id="t-Overall_Status">
                    <option>Not Started</option>
                    <option>In Progress</option>
                    <option>Delayed</option>
                    <option>Completed</option>
                    <option>Required Assistance</option>
                </select>
            </div>
            <div class="input-wrapper"><label>Apron Number</label><input id="t-Apron"></div>
            <div class="input-wrapper"><label>ETD (UTC)</label><input type="datetime-local" id="depTime"></div>
            <div class="input-wrapper"><label>ETA (UTC)</label><input type="datetime-local" id="etaTime"></div>
            <div class="input-wrapper"><label>AT (UTC)</label><input type="datetime-local" id="atTime"></div>
        </div>
        <div id="categoryContainer"></div>
        <div class="input-wrapper"><label>Message</label><textarea id="msgInput" placeholder="Enter notes..."></textarea></div>
        <button onclick="confirmUpdate()" class="btn btn-success" style="width:100%; height:50px;">SYNC TO CLOUD</button>
        <div id="logSections">
            <details open><summary>💬 Messages</summary><div id="msgLogArea"></div></details>
            <details><summary>⚙️ Activity Logs</summary><div id="actionLogArea" style="font-size:12px"></div></details>
        </div>
    </div>
</div>

<div id="addModal" class="overlay">
    <div style="max-width:500px; margin:auto; background:var(--card); padding:20px; border-radius:12px; margin-top:50px">
        <h2>Add New Flight</h2>
        <div class="input-wrapper"><label>Flight No *</label><input id="newF" placeholder="e.g. MH123"></div>
        <div class="input-wrapper"><label>Apron *</label><input id="newA" placeholder="e.g. A12"></div>
        <div class="input-wrapper"><label>ETD (Optional)</label><input type="datetime-local" id="newETD"></div>
        <div class="input-wrapper"><label>ETA (Optional)</label><input type="datetime-local" id="newETA"></div>
        <div class="input-wrapper"><label>AT (Optional)</label><input type="datetime-local" id="newAT"></div>
        <button onclick="saveNewFlight()" class="btn btn-success" style="width:100%">Create Flight</button>
        <button onclick="document.getElementById('addModal').style.display='none'" class="btn btn-gray" style="width:100%; margin-top:10px">Cancel</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNcUXtBufxeST6EzJEa2Me562cdkzBJMM",
  authDomain: "im-apron-turnaround-system.firebaseapp.com",
  databaseURL: "https://im-apron-turnaround-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "im-apron-turnaround-system",
  storageBucket: "im-apron-turnaround-system.firebasestorage.app",
  messagingSenderId: "984848540764",
  appId: "1:984848540764:web:4a54026553c971acb33299"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const CATS = { "Admin": ["Flight Plan Approval","Engineering","Tow Truck Pushback"], "Cabin": ["PAX Boarding (F)","PAX Boarding (B)","Catering"], "Ground": ["Baggage Load","Fueling","Water","Lavatory"] };
let currentF = null, allFlights = {}, useUTC = true;

function checkLogin() {
    const id = document.getElementById('loginId').value;
    const pass = document.getElementById('loginPass').value;
    db.ref('users/' + id).once('value').then(s => {
        const u = s.val();
        if(u && u.pass === pass) { sessionStorage.setItem("user", JSON.stringify(u)); initApp(); }
        else alert("Login Failed");
    });
}

function initApp() {
    const u = JSON.parse(sessionStorage.getItem("user"));
    if(!u) return;
    const theme = localStorage.getItem('theme') || 'light';
    document.body.setAttribute('data-theme', theme);
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainContent').style.display='block';
    document.getElementById('userDisplay').innerText = u.name + " (" + u.pos + ")";
    document.getElementById('pName').value = u.name;
    document.getElementById('pPos').value = u.pos;
    
    db.ref('flights').on('value', s => {
        allFlights = s.val() || {};
        renderFlights();
        if(currentF) openEditor(currentF);
    });
}

function renderFlights() {
    const s = document.getElementById('search').value.toUpperCase();
    const list = document.getElementById("list"); list.innerHTML = "";
    for(let f in allFlights) {
        const d = allFlights[f];
        if(!f.includes(s) && !d.apron.includes(s)) continue;
        const card = document.createElement("div"); card.className = "card";
        let borderColor = '#666';
        if(d['Overall Status']==='Completed') borderColor = '#238636';
        else if(d['Overall Status']==='Delayed') borderColor = '#da3633';
        else if(d['Overall Status']==='Required Assistance') borderColor = '#f1c40f';
        card.style.borderLeftColor = borderColor;
        card.onclick = () => openEditor(f);
        card.innerHTML = `<b>${f}</b> <span style="float:right">Apron: ${d.apron}</span><br>
            <small>Status: ${d['Overall Status']} | ETD: ${d.etd || '-'}</small>`;
        list.appendChild(card);
    }
}

function openEditor(f) {
    currentF = f; const d = allFlights[f];
    document.getElementById('editTitle').innerText = "Update Flight: " + f;
    document.getElementById('t-Overall_Status').value = d['Overall Status'];
    document.getElementById('t-Apron').value = d.apron;
    document.getElementById('depTime').value = d.etd || "";
    document.getElementById('etaTime').value = d.eta || "";
    document.getElementById('atTime').value = d.at || "";

    let h = "";
    for(let c in CATS) {
        h += `<details class="cat-details" open><summary><b>${c} Tasks</b></summary><div class="task-grid">`;
        CATS[c].forEach(t => {
            const val = d[t] || 'Not Started';
            h += `<div><label style="font-size:10px">${t}</label><select id="t-${t.replace(/\s+/g,'_')}">
                <option ${val==='Not Started'?'selected':''}>Not Started</option>
                <option ${val==='In Progress'?'selected':''}>In Progress</option>
                <option ${val==='Completed'?'selected':''}>Completed</option>
                <option ${val==='Delayed'?'selected':''}>Delayed</option>
            </select></div>`;
        });
        h += `</div></details>`;
    }
    document.getElementById('categoryContainer').innerHTML = h;
    renderLogs(d.logs || []);
    document.getElementById('editorOverlay').style.display='block';
}

function confirmUpdate() {
    const u = JSON.parse(sessionStorage.getItem("user"));
    const now = new Date().toISOString();
    let fData = JSON.parse(JSON.stringify(allFlights[currentF]));
    if(!fData.logs) fData.logs = [];

    // Apron 防呆：检查是否有其他活跃航班正占用该 Apron
    const newApron = document.getElementById('t-Apron').value.toUpperCase();
    if(newApron !== fData.apron) {
        for(let otherF in allFlights) {
            if(otherF !== currentF && allFlights[otherF].apron === newApron) {
                alert(`Error: Apron ${newApron} is already occupied by ${otherF}!`);
                return;
            }
        }
    }

    const check = (id, key, label) => {
        const v = document.getElementById(id).value;
        if(fData[key] !== v) {
            fData.logs.push({time:now, task:label, status:v, user:u.name}); 
            fData[key] = v; 
            return true;
        }
        return false;
    };

    let changed = false;
    if(check('t-Overall_Status', 'Overall Status', 'Status')) changed = true;
    if(check('t-Apron', 'apron', 'Apron')) changed = true;
    if(check('depTime', 'etd', 'ETD')) changed = true;
    if(check('etaTime', 'eta', 'ETA')) changed = true;
    if(check('atTime', 'at', 'AT')) changed = true;
    
    Object.values(CATS).flat().forEach(t => {
        if(check(`t-${t.replace(/\s+/g,'_')}`, t, t)) changed = true;
    });

    const msg = document.getElementById('msgInput').value.trim();
    if(msg) { 
        fData.logs.push({time:now, task:"Message", status:msg, user:u.name}); 
        document.getElementById('msgInput').value=""; 
        changed = true;
    }

    if(changed) db.ref('flights/' + currentF).set(fData);
    else alert("No changes detected.");
}

// 添加航班：防呆检查 + 选填时间
async function saveNewFlight() {
    const f = document.getElementById('newF').value.toUpperCase().trim();
    const a = document.getElementById('newA').value.toUpperCase().trim();
    if(!f || !a) return alert("Please fill Flight No and Apron!");

    // 防呆：检查当前列表
    if(allFlights[f]) return alert("Flight No already exists in active list!");

    // 防呆：检查回收箱
    const binSnap = await db.ref('deletedFlights/' + f).once('value');
    if(binSnap.exists()) return alert("Flight No exists in Recycle Bin! Please restore or permanently delete it first.");

    const newFlight = {
        apron: a,
        'Overall Status': 'Not Started',
        etd: document.getElementById('newETD').value || '',
        eta: document.getElementById('newETA').value || '',
        at: document.getElementById('newAT').value || '',
        logs: [{time: new Date().toISOString(), task: "System", status: "Flight Created", user: "Admin/Staff"}]
    };

    db.ref('flights/' + f).set(newFlight);
    document.getElementById('addModal').style.display='none';
    ['newF','newA','newETD','newETA','newAT'].forEach(k=>document.getElementById(k).value="");
}

function toggleAllDetails(expand) {
    document.querySelectorAll('.cat-details').forEach(d => d.open = expand);
}

function updateProfile() {
    const u = JSON.parse(sessionStorage.getItem("user"));
    u.name = document.getElementById('pName').value;
    u.pos = document.getElementById('pPos').value;
    db.ref('users/' + u.id).update({name: u.name, pos: u.pos}).then(() => {
        sessionStorage.setItem("user", JSON.stringify(u));
        location.reload();
    });
}

function renderLogs(logs) {
    const msgs = (logs||[]).filter(l => l.task === "Message").reverse();
    const acts = (logs||[]).filter(l => l.task !== "Message").reverse();
    document.getElementById('msgLogArea').innerHTML = msgs.map(m => `<div class="msg-display"><b>${m.user}:</b> ${m.status}</div>`).join('');
    document.getElementById('actionLogArea').innerHTML = acts.map(a => `<div>[${a.time.substring(11,16)}] ${a.task} -> ${a.status}</div>`).join('');
}

function toggleTheme() {
    const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
}
function toggleTZ() { useUTC = !useUTC; document.getElementById('tzBtn').innerText = useUTC?"UTC":"Local"; renderFlights(); }
function closeEditor() { currentF = null; document.getElementById('editorOverlay').style.display='none'; }
function logout() { sessionStorage.clear(); location.reload(); }
window.onload = () => { if(sessionStorage.getItem("user")) initApp(); };
</script>
</body>
</html>
