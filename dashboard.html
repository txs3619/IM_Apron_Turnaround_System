<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apron Dashboard - Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
  :root { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; }
  [data-theme='light'] { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 1000; }
  .btn { padding: 8px 14px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; margin-left: 5px; }
  .btn-success { background: #238636; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .card { background: var(--card); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid var(--border); }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; padding: 20px; overflow-y: auto; }
  input { padding: 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
  table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  th, td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }
</style>
</head>
<body>

<div class="header">
    <h2>Admin Dashboard</h2>
    <div>
        <input id="search" placeholder="Search..." onkeyup="render()">
        <button id="selBtn" onclick="toggleSelectAll()" class="btn">Select All</button>
        <button id="bDel" onclick="bulkDel()" class="btn btn-danger" style="display:none">Bulk Delete</button>
        <button onclick="document.getElementById('userModal').style.display='block'; renderUsers();" class="btn">Manage Users</button>
        <button onclick="toggleTheme()" class="btn">🌓</button>
    </div>
</div>

<div id="list"></div>

<div id="userModal" class="overlay">
    <div style="background:var(--card); max-width:800px; margin:auto; padding:20px; border-radius:10px">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">
            <div>
                <h3>Add User</h3>
                <input id="uId" placeholder="ID"><br><br>
                <input id="uName" placeholder="Name"><br><br>
                <input id="uPos" placeholder="Position"><br><br>
                <input id="uPass" placeholder="Password"><br><br>
                <button onclick="saveUser('u')" class="btn btn-success">Add New User</button>
            </div>
            <div style="border-left:1px solid var(--border); padding-left:20px">
                <h3>Edit User</h3>
                <input id="eId" placeholder="ID (Read only)" readonly><br><br>
                <input id="eName" placeholder="Name"><br><br>
                <input id="ePos" placeholder="Position"><br><br>
                <input id="ePass" placeholder="New Password"><br><br>
                <button onclick="saveUser('e')" class="btn btn-primary">Update User</button>
            </div>
        </div>
        <hr style="margin:20px 0; border:0; border-top:1px solid var(--border)">
        <table>
            <thead><tr><th>ID</th><th>Name</th><th>Position</th><th>Action</th></tr></thead>
            <tbody id="userList"></tbody>
        </table>
        <button onclick="document.getElementById('userModal').style.display='none'" class="btn" style="width:100%; margin-top:15px">Close</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNcUXtBufxeST6EzJEa2Me562cdkzBJMM",
  authDomain: "im-apron-turnaround-system.firebaseapp.com",
  databaseURL: "https://im-apron-turnaround-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "im-apron-turnaround-system",
  storageBucket: "im-apron-turnaround-system.firebasestorage.app",
  messagingSenderId: "984848540764",
  appId: "1:984848540764:web:4a54026553c971acb33299"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
let allFlights = {}, allUsers = {}, isAllSelected = false;

function render() {
    database.ref('flights').on('value', s => {
        allFlights = s.val() || {};
        const searchTerm = document.getElementById("search").value.toUpperCase();
        const list = document.getElementById("list"); list.innerHTML = "";
        for(let f in allFlights) {
            const d = allFlights[f];
            if(!f.includes(searchTerm) && !d.apron.includes(searchTerm)) continue;
            const card = document.createElement("div"); card.className = "card";
            card.innerHTML = `
                <input type="checkbox" class="bulk" data-id="${f}" onchange="updateUI()"> 
                <b style="margin-left:10px">${f}</b> | Apron: ${d.apron} | Status: ${d['Overall Status']}
                <button onclick="delF('${f}')" class="btn btn-danger" style="float:right">Del</button>
            `;
            list.appendChild(card);
        }
    });
}

function toggleSelectAll() {
    isAllSelected = !isAllSelected;
    document.querySelectorAll('.bulk').forEach(c => c.checked = isAllSelected);
    document.getElementById('selBtn').innerText = isAllSelected ? "Deselect All" : "Select All";
    updateUI();
}

function updateUI() {
    const count = document.querySelectorAll('.bulk:checked').length;
    document.getElementById('bDel').style.display = count > 0 ? 'inline-block' : 'none';
}

function bulkDel() {
    if(!confirm("Delete selected flights?")) return;
    document.querySelectorAll('.bulk:checked').forEach(c => {
        database.ref('flights/' + c.dataset.id).remove();
    });
}

function delF(f) { if(confirm("Delete flight " + f + "?")) database.ref('flights/' + f).remove(); }

// 用户管理核心功能 (100% 对应原逻辑)
function saveUser(prefix) {
    const id = document.getElementById(prefix + 'Id').value.trim();
    const name = document.getElementById(prefix + 'Name').value;
    const pos = document.getElementById(prefix + 'Pos').value;
    const pass = document.getElementById(prefix + 'Pass').value;
    
    if(!id) return alert("ID required");
    let userData = { id, name, pos };
    if(pass) userData.pass = pass;
    else if(prefix === 'e' && allUsers[id]) userData.pass = allUsers[id].pass; // 编辑时如不输密码则保留原密码

    database.ref('users/' + id).update(userData).then(() => {
        alert("User data synced to cloud");
        if(prefix === 'u') { // 清空新增框
            ['uId','uName','uPos','uPass'].forEach(i => document.getElementById(i).value = "");
        }
    });
}

function loadUserEdit(id) {
    const u = allUsers[id];
    document.getElementById('eId').value = u.id;
    document.getElementById('eName').value = u.name;
    document.getElementById('ePos').value = u.pos;
    document.getElementById('ePass').value = ""; // 密码框留空表示不修改
}

function renderUsers() {
    database.ref('users').on('value', s => {
        allUsers = s.val() || {};
        const tbody = document.getElementById("userList"); tbody.innerHTML = "";
        for(let id in allUsers) {
            tbody.innerHTML += `<tr>
                <td>${id}</td><td>${allUsers[id].name}</td><td>${allUsers[id].pos}</td>
                <td>
                    <button onclick="loadUserEdit('${id}')" class="btn btn-success">Edit</button>
                    <button onclick="delU('${id}')" class="btn btn-danger">Del</button>
                </td>
            </tr>`;
        }
    });
}

function delU(id) { if(confirm("Delete user?")) database.ref('users/' + id).remove(); }
function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='dark'?'light':'dark'); }

window.onload = render;
</script>
</body>
</html>
