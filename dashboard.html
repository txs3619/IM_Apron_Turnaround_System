<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apron Dashboard - Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
  :root { --bg: #0b1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --primary: #58a6ff; }
  [data-theme='light'] { --bg: #f0f2f5; --card: #ffffff; --text: #333; --border: #ddd; --primary: #1a237e; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; transition: 0.3s; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 1000; }
  .btn { padding: 8px 14px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
  .btn-primary { background: #1f6feb; color: white; }
  .btn-danger { background: #da3633; color: white; }
  .card { background: var(--card); border-radius: 12px; padding: 15px; margin: 15px; border: 1px solid var(--border); }
  .msg-alert { background: rgba(88,166,255,0.1); border-left: 4px solid var(--primary); padding: 10px; border-radius: 4px; margin: 10px 0; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; padding: 20px; overflow-y: auto; }
  .settings-box { background: var(--card); max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
  .log-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .log-scroll { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 8px; font-size: 11px; border-radius: 5px; }
</style>
</head>
<body data-theme="dark">

<div class="header">
    <h2>Admin Console</h2>
    <div style="display:flex; gap:10px">
        <button id="tzBtn" onclick="toggleTZ()" class="btn btn-primary">UTC</button>
        <button onclick="document.getElementById('setModal').style.display='block'" class="btn">⚙️ Settings</button>
    </div>
</div>

<div id="list"></div>

<div id="setModal" class="overlay">
    <div class="settings-box">
        <h3>Control Panel</h3>
        <button onclick="toggleAllLogs()" class="btn btn-primary" style="width:100%; margin-bottom:10px">📂 Expand/Collapse All Logs</button>
        <button onclick="toggleTheme()" class="btn" style="width:100%; margin-bottom:10px">🌓 Toggle Theme</button>
        <button onclick="alert('Recycle Bin clicked')" class="btn" style="width:100%; margin-bottom:10px">🗑️ Recycle Bin</button>
        <button onclick="alert('Users clicked')" class="btn" style="width:100%; margin-bottom:10px">👥 User Management</button>
        <button onclick="document.getElementById('setModal').style.display='none'" class="btn btn-danger" style="width:100%; margin-top:10px">Close</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNcUXtBufxeST6EzJEa2Me562cdkzBJMM",
  authDomain: "im-apron-turnaround-system.firebaseapp.com",
  databaseURL: "https://im-apron-turnaround-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "im-apron-turnaround-system",
  storageBucket: "im-apron-turnaround-system.firebasestorage.app",
  messagingSenderId: "984848540764",
  appId: "1:984848540764:web:4a54026553c971acb33299"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let allF = {}, useUTC = true, allOpen = false;

function formatDate(iso) {
    if(!iso) return "-";
    const d = new Date(iso);
    if(useUTC) return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0')+' '+String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')+':'+String(d.getUTCSeconds()).padStart(2,'0');
    return d.toLocaleString();
}

function render() {
    db.ref('flights').on('value', s => {
        allF = s.val() || {};
        const list = document.getElementById("list"); list.innerHTML = "";
        for(let f in allF) {
            const d = allF[f];
            const msgs = d.msgs || [];
            const logs = d.logs || [];
            const unreadMsg = msgs.slice().reverse().find(m => m.user !== "Admin" && !m.read);
            const card = document.createElement("div"); card.className = "card";
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <b>${f} (Apron: ${d.apron})</b>
                    <span style="font-size:12px; color:var(--primary)">${d['Overall Status']}</span>
                </div>
                ${unreadMsg ? `<div class="msg-alert">
                    <button onclick="markReadAdmin('${f}', ${msgs.indexOf(unreadMsg)})" class="btn btn-primary" style="float:right; font-size:10px; padding:2px 5px">Mark Read</button>
                    <b>STAFF:</b> ${unreadMsg.status} <small>(${formatDate(unreadMsg.time)})</small>
                </div>` : ""}
                <div style="display:flex; gap:5px; margin-top:10px">
                    <input id="reply-${f}" placeholder="Reply to staff..." style="flex:1; padding:8px; border-radius:4px; border:1px solid var(--border); background:var(--bg); color:var(--text)">
                    <button onclick="sendReply('${f}')" class="btn btn-primary">Send</button>
                </div>
                <div class="log-container">
                    <details ${allOpen?'open':''}><summary style="cursor:pointer; font-size:12px">💬 Messages (${msgs.length})</summary>
                        <div class="log-scroll">${msgs.slice().reverse().map(m=>`<div>[${formatDate(m.time)}] ${m.user}: ${m.status} ${m.read?'✓':''}</div>`).join('')}</div>
                    </details>
                    <details ${allOpen?'open':''}><summary style="cursor:pointer; font-size:12px">⚙️ Actions (${logs.length})</summary>
                        <div class="log-scroll">${logs.slice().reverse().map(l=>`<div>[${formatDate(l.time)}] ${l.task}->${l.status}</div>`).join('')}</div>
                    </details>
                </div>`;
            list.appendChild(card);
        }
    });
}

function sendReply(f) {
    const inp = document.getElementById(`reply-${f}`);
    const val = inp.value.trim();
    if(!val) return;
    const now = new Date().toISOString();
    let msgs = allF[f].msgs || [];
    msgs.push({time:now, user:"Admin", status:val, read:false});
    db.ref('flights/'+f+'/msgs').set(msgs).then(()=>inp.value="");
}

function markReadAdmin(f, idx) { db.ref('flights/'+f+'/msgs/'+idx+'/read').set(true); }
function toggleAllLogs() { allOpen = !allOpen; render(); }
function toggleTZ() { useUTC = !useUTC; document.getElementById('tzBtn').innerText = useUTC?"UTC":"Local"; render(); }
function toggleTheme() { const t = document.body.getAttribute('data-theme')==='dark'?'light':'dark'; document.body.setAttribute('data-theme', t); }
window.onload = render;
</script>
</body>
</html>
