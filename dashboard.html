<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apron Dashboard - Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
  :root{--bg:#0b1117;--card:#161b22;--text:#c9d1d9;--border:#30363d;--primary:#58a6ff;}
  [data-theme='light']{--bg:#f0f2f5;--card:#fff;--text:#333;--border:#ddd;--primary:#1a237e;}
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);margin:0;padding-bottom:80px;transition:background .3s,color .3s;}
  .hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;gap:6px;flex-wrap:wrap;}
  .btn{padding:5px 10px;border-radius:6px;border:none;font-weight:bold;cursor:pointer;font-size:12px;transition:opacity .15s;}
  .btn:hover{opacity:.85;}
  .btn-primary{background:#1f6feb;color:white;}
  .btn-danger{background:#da3633;color:white;}
  .btn-warning{background:#e3b341;color:#000;}
  .btn-success{background:#238636;color:white;}
  .btn-ghost{background:rgba(128,128,128,0.15);color:var(--text);}
  /* Bulk bar */
  #bulkBar{display:none;position:sticky;top:48px;z-index:900;background:#1f6feb;color:white;padding:6px 14px;align-items:center;gap:8px;flex-wrap:wrap;}
  #bulkBar.on{display:flex;}
  /* Controls row */
  #ctrlRow{padding:7px 14px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;background:var(--card);border-bottom:1px solid var(--border);}
  #ctrlRow input{flex:1;min-width:120px;padding:6px 10px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;}
  #ctrlRow select{padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;}
  /* Flight card */
  .fcard{background:var(--card);border-radius:11px;padding:11px 13px 11px 17px;margin:6px 12px;border:1px solid var(--border);border-left:7px solid #888;transition:box-shadow .15s;}
  .fcard.sel{box-shadow:0 0 0 2px #58a6ff;}
  /* Drag */
  .drag-handle{cursor:grab;padding:0 3px;color:#888;font-size:14px;user-select:none;flex-shrink:0;}
  .fcard.dragging{opacity:.4;}
  .fcard.drag-over{border-top:3px solid #58a6ff;}
  /* Status pills */
  .pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:bold;white-space:nowrap;}
  /* Task section blocks in card */
  .dash-cat{border-radius:8px;padding:7px 9px;margin-top:6px;}
  .dash-cat-title{font-size:11px;font-weight:bold;margin-bottom:4px;opacity:.85;}
  .task-row{display:flex;flex-wrap:wrap;gap:3px;}
  .tc{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;}
  /* Log */
  .msg-alert{background:rgba(88,166,255,0.1);border-left:4px solid var(--primary);padding:7px 10px;border-radius:4px;margin:7px 0;font-size:13px;}
  .log-scroll{max-height:110px;overflow-y:auto;background:rgba(0,0,0,0.15);padding:6px;font-size:11px;border-radius:5px;margin-top:4px;}
  .check{width:15px;height:15px;cursor:pointer;accent-color:#58a6ff;flex-shrink:0;}
  .reply-row{display:flex;gap:6px;margin-top:8px;}
  .reply-row input{flex:1;padding:7px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;}
  /* Live clock */
  #liveClock{font-size:11px;font-weight:bold;letter-spacing:.4px;cursor:pointer;user-select:none;padding:4px 9px;border-radius:6px;background:rgba(128,128,128,0.12);white-space:nowrap;}
  /* Overlays */
  .big-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:4000;padding:20px;overflow-y:auto;}
  .mbox{background:var(--card);max-width:640px;margin:36px auto;padding:20px;border-radius:13px;border:1px solid var(--border);}
  .ri{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:1px solid var(--border);gap:8px;}
  .gitem{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--border);}
  .gitem input[type=text]{flex:1;padding:6px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;}
  /* Zone header */
  .zone-header{display:flex;align-items:center;gap:8px;padding:8px 14px 2px;flex-wrap:wrap;}
  .zone-title{font-weight:bold;font-size:13px;flex:1;}
  /* Timer */
  .sw-display{font-size:12px;font-weight:bold;font-family:monospace;padding:3px 8px;border-radius:5px;background:rgba(128,128,128,0.12);}
  .cd-ok{background:rgba(35,134,54,0.15);color:#3fb950;}
  .cd-warn{background:rgba(225,183,64,0.2);color:#e3b341;}
  .cd-late{background:rgba(218,54,51,0.2);color:#f85149;}
</style>
</head>
<body data-theme="dark">

<!-- HEADER – settings spread inline -->
<div class="hdr">
  <div style="display:flex;align-items:center;gap:8px">
    <h2 style="margin:0;font-size:15px;white-space:nowrap">✈ Admin</h2>
    <label style="font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none">
      <input type="checkbox" id="selAllChk" class="check" onchange="toggleSelAll(this.checked)"> All
    </label>
  </div>
  <span id="liveClock" onclick="toggleTZ()" title="Tap to switch UTC/Local" style="flex:1;text-align:center">--</span>
  <!-- All settings buttons inline -->
  <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
    <button onclick="toggleAllLogs()" class="btn btn-ghost" id="logsBtn" title="Expand/Collapse logs">📂</button>
    <button onclick="openRecycleBin()" class="btn btn-warning" title="Recycle Bin">🗑️</button>
    <button onclick="toggleTheme()" class="btn btn-ghost" title="Toggle Theme">🌓</button>
    <button onclick="openUserMgmt()" class="btn btn-ghost" title="User Management">👥</button>
  </div>
</div>

<!-- BULK BAR -->
<div id="bulkBar">
  <span id="selCount" style="font-weight:bold;font-size:13px">0 selected</span>
  <button onclick="bulkRecycle()" class="btn btn-danger">🗑️ Move to Bin</button>
  <button onclick="clearSel()" class="btn" style="background:rgba(255,255,255,0.2);color:white;margin-left:auto">✕ Cancel</button>
</div>

<!-- SEARCH + SORT + MANAGE ZONES (one row) -->
<div id="ctrlRow">
  <input id="searchIn" placeholder="🔍 Search flight, apron, status..." oninput="renderAll()">
  <select id="sortField" onchange="renderAll()" title="Sort by">
    <option value="manual">Manual Order</option>
    <option value="name">Flight Name</option>
    <option value="apron">Apron</option>
    <option value="etd">ETD</option>
    <option value="status">Status</option>
  </select>
  <select id="sortDir" onchange="renderAll()">
    <option value="asc">▲ Asc</option>
    <option value="desc">▼ Desc</option>
  </select>
  <button onclick="openZoneMgmt()" class="btn btn-ghost" style="white-space:nowrap">🗺️ Zones</button>
</div>

<div id="mainList" style="margin-top:4px"></div>

<!-- RECYCLE BIN -->
<div id="recycleOv" class="big-ov">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="margin:0">🗑️ Recycle Bin</h3>
      <button onclick="document.getElementById('recycleOv').style.display='none'" class="btn btn-danger">Close</button>
    </div>
    <div id="recycleBulkBar" style="display:none;background:#1f6feb;color:white;padding:7px 10px;border-radius:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;gap:8px">
      <span id="recycleSelCount" style="font-weight:bold;font-size:13px">0 selected</span>
      <button onclick="bulkRestoreRecycle()" class="btn btn-success" style="font-size:12px;padding:4px 10px">↩ Restore</button>
      <button onclick="bulkPermDelete()" class="btn btn-danger" style="font-size:12px;padding:4px 10px">✕ Delete</button>
      <button onclick="clearRecycleSel()" class="btn" style="background:rgba(255,255,255,0.2);color:white;margin-left:auto;font-size:12px;padding:4px 8px">✕ Cancel</button>
    </div>
    <label style="font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;margin-bottom:8px;user-select:none">
      <input type="checkbox" id="recycleSelAll" class="check" onchange="toggleRecycleSelAll(this.checked)"> Select All
    </label>
    <div id="recycleList"><i>Loading...</i></div>
  </div>
</div>

<!-- ZONE MANAGEMENT -->
<div id="zoneOv" class="big-ov">
  <div class="mbox" style="max-width:540px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="margin:0">🗺️ Manage Zones</h3>
      <button onclick="document.getElementById('zoneOv').style.display='none'" class="btn btn-danger">Close</button>
    </div>
    <p style="font-size:12px;color:#888;margin-top:0">Flights not in any zone appear under "Unassigned".</p>
    <div id="zoneList"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <input id="newZoneName" placeholder="New zone name..." style="flex:1;padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text)">
      <button onclick="addZone()" class="btn btn-success">+ Add</button>
    </div>
  </div>
</div>

<!-- USER MANAGEMENT -->
<div id="userOv" class="big-ov">
  <div class="mbox" style="max-width:660px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="margin:0">👥 User Management</h3>
      <button onclick="document.getElementById('userOv').style.display='none'" class="btn btn-danger">Close</button>
    </div>
    <div style="background:rgba(128,128,128,0.07);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:16px">
      <h4 id="uFormTitle" style="margin:0 0 11px">➕ Add New User</h4>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px">
        <div><label style="font-size:11px;font-weight:bold;color:#888;display:block;margin-bottom:3px">Staff ID *</label>
          <input id="uId" placeholder="e.g. S001" style="padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:100%"></div>
        <div><label style="font-size:11px;font-weight:bold;color:#888;display:block;margin-bottom:3px">Full Name *</label>
          <input id="uName" placeholder="e.g. Ahmad" style="padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:100%"></div>
        <div><label style="font-size:11px;font-weight:bold;color:#888;display:block;margin-bottom:3px">Position *</label>
          <input id="uPos" placeholder="e.g. Ground Staff" style="padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:100%"></div>
        <div><label id="uPassLbl" style="font-size:11px;font-weight:bold;color:#888;display:block;margin-bottom:3px">Password *</label>
          <input id="uPass" type="password" style="padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:100%"></div>
      </div>
      <div style="display:flex;gap:7px">
        <button onclick="saveUser()" class="btn btn-success" style="flex:1">💾 Save</button>
        <button id="uCancelBtn" onclick="cancelUserEdit()" class="btn btn-danger" style="display:none">✕ Cancel</button>
      </div>
      <p id="uMsg" style="margin:6px 0 0;font-size:12px;display:none"></p>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <b>Existing Users</b>
      <input id="uSearch" placeholder="Search..." onkeyup="filterUsers()" style="padding:6px 9px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);width:145px">
    </div>
    <div id="uList"><i style="color:#888">Loading...</i></div>
  </div>
</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSyBNcUXtBufxeST6EzJEa2Me562cdkzBJMM",
  authDomain:"im-apron-turnaround-system.firebaseapp.com",
  databaseURL:"https://im-apron-turnaround-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"im-apron-turnaround-system",
  storageBucket:"im-apron-turnaround-system.firebasestorage.app",
  messagingSenderId:"984848540764",
  appId:"1:984848540764:web:4a54026553c971acb33299"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const CATS={
  "Admin":  {emoji:"🛫", color:"rgba(31,111,235,0.1)",  textColor:"#58a6ff", tasks:["Cockpit","Flight Plan","NOTAM/ATIS"]},
  "Cabin":  {emoji:"🧹", color:"rgba(156,39,176,0.1)",  textColor:"#ce93d8", tasks:["Cleaning (F/B)","Cleaning (E)","Catering (F/B)","Catering (E)"]},
  "Ground": {emoji:"🚛", color:"rgba(121,85,72,0.15)",  textColor:"#a1887f", tasks:["Baggage (F)","Baggage (R)","Cargo (F)","Cargo (R)","Galley","Fuel","Water","Lavatory"]}
};
const ALL_TASKS=Object.values(CATS).flatMap(c=>c.tasks);
const STATUS_ORDER={'Arriving':0,'On Chocked':1,'Delayed':2,'PB Attached':3,'Push Backed':4,'Need Assistant':5};

let allF={}, useUTC=true, allOpen=false, selFlights=new Set();
let flightsRef=null, zonesRef=null, zones=[], clockInterval=null;
// Per-card stopwatch state: {f: {start, elapsed, running, interval}}
const swState={};
// Per-card countdown intervals
const cdState={};

function pad(n){return String(n).padStart(2,'0');}
function fmtDate(iso){
  if(!iso) return '-';
  const d=new Date(iso);
  if(useUTC) return [d.getUTCFullYear(),pad(d.getUTCMonth()+1),pad(d.getUTCDate())].join('-')+' '+[pad(d.getUTCHours()),pad(d.getUTCMinutes()),pad(d.getUTCSeconds())].join(':');
  return d.toLocaleString();
}

// ── Overall border colour ────────────────────────────────────────
function overallBorder(s){
  if(s==='Arriving')      return '#888';
  if(s==='On Chocked')    return '#222';
  if(s==='Delayed')       return '#da3633';
  if(s==='PB Attached')   return '#1f6feb';
  if(s==='Push Backed')   return '#238636';
  if(s==='Need Assistant') return '#e3b341';
  return '#888';
}
function overallPill(s){
  const styles={
    'Arriving':      'background:rgba(128,128,128,0.2);color:#aaa',
    'On Chocked':    'background:rgba(20,20,20,0.4);color:#ccc',
    'Delayed':       'background:rgba(218,54,51,0.2);color:#f85149',
    'PB Attached':   'background:rgba(31,111,235,0.2);color:#58a6ff',
    'Push Backed':   'background:rgba(35,134,54,0.2);color:#3fb950',
    'Need Assistant':'background:rgba(225,183,64,0.2);color:#e3b341'
  };
  return `<span class="pill" style="${styles[s]||'background:rgba(128,128,128,0.15);color:#888'}">${s||'—'}</span>`;
}

// Task chip style – aligned with spec: NS=grey, IP=black-ish, OK=green, DL=red, NA=yellow
function tcStyle(s){
  if(s==='Completed')      return 'background:rgba(35,134,54,0.25);color:#3fb950';
  if(s==='Delayed')        return 'background:rgba(218,54,51,0.25);color:#f85149';
  if(s==='Need Assistant') return 'background:rgba(225,183,64,0.3);color:#e3b341';
  if(s==='In Progress')    return 'background:rgba(40,40,40,0.6);color:#c9d1d9';
  return 'background:rgba(128,128,128,0.15);color:#777'; // Not Started = grey
}

// ── Live clock ────────────────────────────────────────────────────
function updateClock(){
  const el=document.getElementById('liveClock'); if(!el) return;
  const now=new Date();
  if(useUTC){
    el.innerText=[now.getUTCFullYear(),pad(now.getUTCMonth()+1),pad(now.getUTCDate())].join('-')+' '+
                 [pad(now.getUTCHours()),pad(now.getUTCMinutes()),pad(now.getUTCSeconds())].join(':')+'  UTC';
  } else {
    el.innerText=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+' '+
                 pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds())+'  Local';
  }
}
function startClock(){updateClock();if(clockInterval)clearInterval(clockInterval);clockInterval=setInterval(updateClock,1000);}

// ── Firebase ─────────────────────────────────────────────────────
function startListeners(){
  if(!flightsRef){flightsRef=db.ref('flights');flightsRef.on('value',s=>{allF=s.val()||{};renderAll();});}
  if(!zonesRef){
    zonesRef=db.ref('zones');
    zonesRef.on('value',s=>{
      const raw=s.val();
      zones=raw?Object.entries(raw).map(([id,g])=>({id,...g})):[];
      zones.sort((a,b)=>(a.order||0)-(b.order||0));
      renderAll();
    });
  }
}

// ── Sort ──────────────────────────────────────────────────────────
function sortFlights(entries){
  const field=document.getElementById('sortField').value;
  const dir=document.getElementById('sortDir').value==='asc'?1:-1;
  if(field==='manual') return entries;
  return [...entries].sort((a,b)=>{
    const [fa,da]= a, [fb,db]=b;
    let va,vb;
    if(field==='name'){va=fa;vb=fb;}
    else if(field==='apron'){va=da.apron||'';vb=db.apron||'';}
    else if(field==='etd'){va=da.etd||'';vb=db.etd||'';}
    else if(field==='status'){va=STATUS_ORDER[da['Overall Status']]??99;vb=STATUS_ORDER[db['Overall Status']]??99;}
    if(typeof va==='number') return (va-vb)*dir;
    return va.localeCompare(vb)*dir;
  });
}

// ── Main render ───────────────────────────────────────────────────
function renderAll(){
  const q=(document.getElementById('searchIn').value||'').toLowerCase();
  const container=document.getElementById('mainList'); container.innerHTML='';
  const active=Object.entries(allF).filter(([,d])=>!d._deleted);
  const filtered=active.filter(([f,d])=>{
    if(!q) return true;
    return f.toLowerCase().includes(q)||(d.apron||'').toLowerCase().includes(q)||(d['Overall Status']||'').toLowerCase().includes(q);
  });
  if(!filtered.length){container.innerHTML='<p style="text-align:center;color:#888;padding:40px">No flights found.</p>';updateBulkBar();return;}

  const assigned=new Set();
  const zoneBuckets=zones.map(z=>{
    let zFlights=(z.flights||[]).filter(f=>filtered.find(([k])=>k===f));
    zFlights.forEach(f=>assigned.add(f));
    const entries=zFlights.map(f=>filtered.find(([k])=>k===f)).filter(Boolean);
    return {z, entries:sortFlights(entries)};
  });
  const unassigned=sortFlights(filtered.filter(([f])=>!assigned.has(f)));

  zoneBuckets.forEach(({z,entries})=>{
    if(!entries.length) return;
    const sec=document.createElement('div');
    const zid='zb-'+z.id;
    sec.innerHTML=`<div class="zone-header"><span class="zone-title">📍 ${z.name} <span style="color:#888;font-weight:normal;font-size:12px">(${entries.length})</span></span></div><div class="zone-body" id="${zid}"></div>`;
    container.appendChild(sec);
    const body=sec.querySelector('#'+zid);
    entries.forEach(([f,d])=>body.appendChild(makeCard(f,d,z.id)));
    if(document.getElementById('sortField').value==='manual') enableDragDrop(body,z.id);
  });
  if(unassigned.length){
    const sec=document.createElement('div');
    sec.innerHTML=`<div class="zone-header"><span class="zone-title" style="color:#888">📋 Unassigned <span style="font-weight:normal;font-size:12px">(${unassigned.length})</span></span></div><div class="zone-body" id="zb-unassigned"></div>`;
    container.appendChild(sec);
    const body=sec.querySelector('#zb-unassigned');
    unassigned.forEach(([f,d])=>body.appendChild(makeCard(f,d,'unassigned')));
    if(document.getElementById('sortField').value==='manual') enableDragDrop(body,'unassigned');
  }
  updateBulkBar();
  // Restart countdowns for visible cards
  Object.keys(allF).forEach(f=>{if(allF[f].etd&&!allF[f]._deleted) startCardCountdown(f,allF[f].etd);});
}

// ── Card countdown ────────────────────────────────────────────────
function startCardCountdown(f,etdVal){
  if(cdState[f]) clearInterval(cdState[f]);
  function tick(){
    const el=document.getElementById('cd-'+f); if(!el) return clearInterval(cdState[f]);
    const diff=new Date(etdVal)-new Date();
    const abs=Math.abs(diff), s=Math.floor(abs/1000)%60, m=Math.floor(abs/60000)%60, h=Math.floor(abs/3600000);
    const str=pad(h)+':'+pad(m)+':'+pad(s);
    if(diff<0){el.innerText='-'+str+' LATE';el.className='sw-display cd-late';}
    else if(diff<1800000){el.innerText='⚠ '+str;el.className='sw-display cd-warn';}
    else{el.innerText='▶ '+str;el.className='sw-display cd-ok';}
  }
  tick(); cdState[f]=setInterval(tick,1000);
}

// ── Card stopwatch ────────────────────────────────────────────────
function swToggleCard(f){
  if(!swState[f]) swState[f]={start:null,elapsed:0,running:false,interval:null};
  const sw=swState[f];
  const btn=document.getElementById('sw-btn-'+f), disp=document.getElementById('sw-disp-'+f);
  if(!sw.running){
    sw.start=Date.now(); sw.running=true;
    sw.interval=setInterval(()=>{
      const total=sw.elapsed+Date.now()-sw.start;
      const s=Math.floor(total/1000)%60,m=Math.floor(total/60000)%60,h=Math.floor(total/3600000);
      if(disp) disp.innerText=pad(h)+':'+pad(m)+':'+pad(s);
    },500);
    if(btn) btn.innerText='⏸';
  } else {
    sw.elapsed+=Date.now()-sw.start; sw.running=false; clearInterval(sw.interval);
    if(btn) btn.innerText='▶';
  }
}
function swResetCard(f){
  if(swState[f]){clearInterval(swState[f].interval);swState[f]={start:null,elapsed:0,running:false,interval:null};}
  const disp=document.getElementById('sw-disp-'+f), btn=document.getElementById('sw-btn-'+f);
  if(disp) disp.innerText='00:00:00';
  if(btn) btn.innerText='▶';
}

// ── Make card ─────────────────────────────────────────────────────
function makeCard(f,d,zoneId){
  const msgs=d.msgs||[], logs=d.logs||[];
  const unreadMsg=msgs.slice().reverse().find(m=>m.user!=='Admin'&&!m.read);
  const isSel=selFlights.has(f);
  const totalEntries=msgs.length+logs.length;
  const isManual=document.getElementById('sortField').value==='manual';

  // Build per-cat sections
  const catSections=Object.keys(CATS).map(ck=>{
    const cat=CATS[ck];
    const catS=d['cat_'+ck]||'Not Started';
    const chips=cat.tasks.map(t=>{
      const s=d[t]||'Not Started';
      const short=t.replace(' (F/B)','(FB)').replace(' (F)','(F)').replace(' (R)','(R)').replace(' (E)','(E)');
      return `<span class="tc" style="${tcStyle(s)}">${short}</span>`;
    }).join('');
    return `<div class="dash-cat" style="background:${cat.color}">
      <div class="dash-cat-title" style="color:${cat.textColor}">${cat.emoji} ${ck} — <span style="${tcStyle(catS)};padding:1px 6px;border-radius:6px;font-size:10px">${catS}</span></div>
      <div class="task-row">${chips}</div>
    </div>`;
  }).join('');

  const card=document.createElement('div');
  card.className='fcard'+(isSel?' sel':'');
  card.id='card-'+f; card.dataset.flight=f;
  card.style.borderLeftColor=overallBorder(d['Overall Status']);
  card.innerHTML=`
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      ${isManual?`<span class="drag-handle" title="Drag to reorder">⠿</span>`:''}
      <input type="checkbox" class="check" ${isSel?'checked':''} onchange="toggleSel('${f}',this.checked)" onclick="event.stopPropagation()">
      <div style="flex:1;min-width:0">
        <b style="font-size:14px">${f}</b>
        <span style="color:#888;font-size:12px;margin-left:6px">Apron ${d.apron}</span>
        ${d.etd?`<span style="color:#888;font-size:11px;margin-left:6px">ETD ${d.etd.substring(11,16)}</span>`:''}
      </div>
      ${overallPill(d['Overall Status'])}
    </div>
    <!-- Timers row -->
    <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;align-items:center">
      <div style="display:flex;gap:4px;align-items:center">
        <span style="font-size:10px;color:#888">⏱</span>
        <span id="sw-disp-${f}" class="sw-display">00:00:00</span>
        <button id="sw-btn-${f}" onclick="swToggleCard('${f}');event.stopPropagation()" class="btn btn-success" style="font-size:10px;padding:2px 7px">▶</button>
        <button onclick="swResetCard('${f}');event.stopPropagation()" class="btn btn-ghost" style="font-size:10px;padding:2px 7px">↺</button>
      </div>
      ${d.etd?`<div style="display:flex;gap:4px;align-items:center">
        <span style="font-size:10px;color:#888">⏳</span>
        <span id="cd-${f}" class="sw-display cd-ok">--:--:--</span>
      </div>`:''}
    </div>
    <!-- Cat sections -->
    ${catSections}
    ${unreadMsg?`<div class="msg-alert">
      <button onclick="markRead('${f}',${msgs.indexOf(unreadMsg)});event.stopPropagation()" class="btn btn-primary" style="float:right;font-size:10px;padding:2px 5px">Mark Read</button>
      <b>STAFF:</b> ${unreadMsg.status} <small>(${fmtDate(unreadMsg.time)})</small>
    </div>`:''}
    <div class="reply-row">
      <input id="reply-${f}" placeholder="Reply to staff..." onclick="event.stopPropagation()">
      <button onclick="sendReply('${f}');event.stopPropagation()" class="btn btn-primary" style="font-size:12px">Send</button>
      <button onclick="toggleLogs('${f}');event.stopPropagation()" class="btn btn-ghost" id="logBtn-${f}" style="font-size:12px;white-space:nowrap">
        📋 ${allOpen?'Hide':'Logs'}${totalEntries>0?` <span style="background:#1f6feb;color:white;border-radius:9px;padding:1px 5px;font-size:10px">${totalEntries}</span>`:''}
      </button>
    </div>
    <div id="logs-${f}" style="display:${allOpen?'block':'none'};margin-top:8px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
        <div>
          <div style="font-size:11px;font-weight:bold;color:var(--primary);margin-bottom:3px">💬 Messages (${msgs.length})</div>
          <div class="log-scroll">${msgs.slice().reverse().map(m=>`<div style="margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid rgba(128,128,128,0.12)"><b style="font-size:10px">${m.user}</b> <span style="color:#888;font-size:10px">${fmtDate(m.time)}</span>${m.read?' <span style="color:#3fb950;font-size:9px">✓</span>':''}<br>${m.status}</div>`).join('')||'<i style="color:#888">None</i>'}</div>
        </div>
        <div>
          <div style="font-size:11px;font-weight:bold;color:var(--primary);margin-bottom:3px">⚙️ Actions (${logs.length})</div>
          <div class="log-scroll">${logs.slice().reverse().map(l=>`<div style="margin-bottom:2px">[${fmtDate(l.time)}] <b>${l.task}</b>→${l.status}</div>`).join('')||'<i style="color:#888">None</i>'}</div>
        </div>
      </div>
    </div>`;
  return card;
}

function toggleLogs(f){
  const el=document.getElementById('logs-'+f),btn=document.getElementById('logBtn-'+f);
  const show=el.style.display==='none'; el.style.display=show?'block':'none';
  const d=allF[f], total=((d.msgs||[]).length+(d.logs||[]).length);
  btn.innerHTML=`📋 ${show?'Hide':'Logs'}${total>0?` <span style="background:#1f6feb;color:white;border-radius:9px;padding:1px 5px;font-size:10px">${total}</span>`:''}`;
}

// ── Drag-drop ──────────────────────────────────────────────────────
let dragSrc=null;
function enableDragDrop(container,zoneId){
  container.querySelectorAll('.fcard').forEach(card=>{
    card.setAttribute('draggable','true');
    card.addEventListener('dragstart',e=>{dragSrc=card;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{dragSrc=null;card.classList.remove('dragging');container.querySelectorAll('.fcard').forEach(c=>c.classList.remove('drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();if(dragSrc&&dragSrc!==card)card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault(); if(!dragSrc||dragSrc===card)return;
      card.classList.remove('drag-over');
      const cards=[...container.querySelectorAll('.fcard')];
      if(cards.indexOf(dragSrc)<cards.indexOf(card)) container.insertBefore(dragSrc,card.nextSibling);
      else container.insertBefore(dragSrc,card);
      const newOrder=[...container.querySelectorAll('.fcard')].map(c=>c.dataset.flight);
      if(zoneId!=='unassigned') db.ref('zones/'+zoneId+'/flights').set(newOrder);
    });
  });
}

// ── Multi-select ──────────────────────────────────────────────────
function toggleSel(f,checked){if(checked)selFlights.add(f);else selFlights.delete(f);document.getElementById('card-'+f)?.classList.toggle('sel',checked);updateBulkBar();}
function toggleSelAll(checked){selFlights.clear();if(checked)Object.entries(allF).filter(([,d])=>!d._deleted).forEach(([f])=>selFlights.add(f));renderAll();}
function clearSel(){selFlights.clear();document.getElementById('selAllChk').checked=false;renderAll();}
function updateBulkBar(){const n=selFlights.size;document.getElementById('bulkBar').classList.toggle('on',n>0);document.getElementById('selCount').innerText=n+' selected';}
function bulkRecycle(){
  if(!confirm('Move '+selFlights.size+' flight(s) to Recycle Bin?'))return;
  const now=new Date().toISOString(),u={};
  selFlights.forEach(f=>{u['flights/'+f+'/_deleted']=true;u['flights/'+f+'/_deletedAt']=now;});
  db.ref().update(u).then(clearSel);
}

// ── Recycle Bin ────────────────────────────────────────────────────
let recycleSel=new Set();
function openRecycleBin(){document.getElementById('recycleOv').style.display='block';loadRecycleBin();}
function loadRecycleBin(){
  const c=document.getElementById('recycleList');c.innerHTML='<i>Loading...</i>';
  recycleSel.clear();updateRecycleBulkBar();document.getElementById('recycleSelAll').checked=false;
  db.ref('flights').once('value',s=>{
    const del=Object.entries(s.val()||{}).filter(([,v])=>v._deleted);
    if(!del.length){c.innerHTML="<p style='color:#888'>Recycle bin is empty.</p>";return;}
    c.innerHTML=del.map(([f,d])=>`<div class="ri" id="ri-${f}">
      <div style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" class="check recycle-chk" data-f="${f}" onchange="toggleRecycleSel('${f}',this.checked)">
        <div><b>${f}</b> — Apron: ${d.apron}<br><small style="color:#888">Deleted: ${fmtDate(d._deletedAt)}</small></div>
      </div>
      <div style="display:flex;gap:5px">
        <button onclick="restoreFlight('${f}')" class="btn btn-success" style="font-size:11px;padding:3px 9px">↩</button>
        <button onclick="permDelete('${f}')" class="btn btn-danger" style="font-size:11px;padding:3px 9px">✕</button>
      </div></div>`).join('');
  });
}
function toggleRecycleSel(f,checked){if(checked)recycleSel.add(f);else recycleSel.delete(f);updateRecycleBulkBar();}
function toggleRecycleSelAll(checked){recycleSel.clear();document.querySelectorAll('.recycle-chk').forEach(chk=>{chk.checked=checked;if(checked)recycleSel.add(chk.dataset.f);});updateRecycleBulkBar();}
function clearRecycleSel(){recycleSel.clear();document.querySelectorAll('.recycle-chk').forEach(c=>c.checked=false);document.getElementById('recycleSelAll').checked=false;updateRecycleBulkBar();}
function updateRecycleBulkBar(){const bar=document.getElementById('recycleBulkBar');bar.style.display=recycleSel.size>0?'flex':'none';document.getElementById('recycleSelCount').innerText=recycleSel.size+' selected';}
function bulkRestoreRecycle(){if(!recycleSel.size)return;const u={};recycleSel.forEach(f=>{u['flights/'+f+'/_deleted']=null;u['flights/'+f+'/_deletedAt']=null;});db.ref().update(u).then(loadRecycleBin);}
function bulkPermDelete(){if(!confirm('Permanently delete '+recycleSel.size+' flight(s)?'))return;Promise.all([...recycleSel].map(f=>db.ref('flights/'+f).remove())).then(loadRecycleBin);}
function restoreFlight(f){db.ref('flights/'+f+'/_deleted').remove();db.ref('flights/'+f+'/_deletedAt').remove();loadRecycleBin();}
function permDelete(f){if(!confirm('Permanently delete '+f+'?'))return;db.ref('flights/'+f).remove().then(loadRecycleBin);}

// ── Zones ──────────────────────────────────────────────────────────
function openZoneMgmt(){document.getElementById('zoneOv').style.display='block';renderZoneMgmt();}
function renderZoneMgmt(){
  const container=document.getElementById('zoneList');container.innerHTML='';
  if(!zones.length){container.innerHTML='<p style="color:#888;font-size:13px">No zones yet.</p>';return;}
  const activeKeys=Object.keys(allF).filter(f=>!allF[f]._deleted);
  zones.forEach((z,idx)=>{
    const div=document.createElement('div');div.className='gitem';
    div.innerHTML=`<div style="display:flex;flex-direction:column;gap:5px;flex:1;min-width:0">
      <input type="text" value="${z.name}" id="zname-${z.id}">
      <label style="font-size:11px;color:#888">Assign flights (Ctrl+click multi):</label>
      <select multiple id="zfl-${z.id}" style="font-size:11px;padding:3px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);min-width:160px;max-height:70px">
        ${activeKeys.map(f=>`<option value="${f}" ${(z.flights||[]).includes(f)?'selected':''}>${f}</option>`).join('')}
      </select></div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
        <button onclick="saveZone('${z.id}')" class="btn btn-success" style="font-size:11px;padding:3px 8px">💾</button>
        <button onclick="moveZone('${z.id}',-1)" class="btn btn-ghost" style="font-size:11px;padding:3px 8px" ${idx===0?'disabled':''}>▲</button>
        <button onclick="moveZone('${z.id}',1)" class="btn btn-ghost" style="font-size:11px;padding:3px 8px" ${idx===zones.length-1?'disabled':''}>▼</button>
        <button onclick="deleteZone('${z.id}')" class="btn btn-danger" style="font-size:11px;padding:3px 8px">🗑️</button>
      </div>`;
    container.appendChild(div);
  });
}
function saveZone(id){
  const name=document.getElementById('zname-'+id).value.trim();if(!name)return;
  const sel=document.getElementById('zfl-'+id);
  const flights=[...sel.options].filter(o=>o.selected).map(o=>o.value);
  db.ref('zones/'+id).update({name,flights}).then(()=>renderZoneMgmt());
}
function addZone(){
  const name=document.getElementById('newZoneName').value.trim();if(!name)return;
  const newId='z'+Date.now(), order=zones.length?Math.max(...zones.map(g=>g.order||0))+1:0;
  db.ref('zones/'+newId).set({name,flights:[],order}).then(()=>document.getElementById('newZoneName').value='');
}
function deleteZone(id){if(!confirm('Delete this zone?'))return;db.ref('zones/'+id).remove();}
function moveZone(id,dir){
  const idx=zones.findIndex(g=>g.id===id),swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=zones.length)return;
  const u={};u['zones/'+zones[idx].id+'/order']=swapIdx;u['zones/'+zones[swapIdx].id+'/order']=idx;
  db.ref().update(u);
}

// ── Misc ───────────────────────────────────────────────────────────
function sendReply(f){
  const inp=document.getElementById('reply-'+f),val=inp.value.trim();if(!val)return;
  let msgs=allF[f].msgs||[];
  msgs.push({time:new Date().toISOString(),user:'Admin',status:val,read:false});
  db.ref('flights/'+f+'/msgs').set(msgs).then(()=>inp.value='');
}
function markRead(f,idx){db.ref('flights/'+f+'/msgs/'+idx+'/read').set(true);}
function toggleAllLogs(){allOpen=!allOpen;document.getElementById('logsBtn').innerText=allOpen?'📂✕':'📂';renderAll();}
function toggleTZ(){useUTC=!useUTC;updateClock();renderAll();}
function toggleTheme(){
  const t=document.body.getAttribute('data-theme')==='dark'?'light':'dark';
  document.body.setAttribute('data-theme',t);localStorage.setItem('theme',t);
}

// ── User Management ────────────────────────────────────────────────
let allUsers={},editingUid=null;
function openUserMgmt(){document.getElementById('userOv').style.display='block';cancelUserEdit();loadUsers();}
function loadUsers(){document.getElementById('uList').innerHTML="<i style='color:#888'>Loading...</i>";db.ref('users').once('value',s=>{allUsers=s.val()||{};renderUsers();});}
function renderUsers(filter){
  const c=document.getElementById('uList');
  const keys=Object.keys(allUsers).filter(k=>{if(!filter)return true;const u=allUsers[k];return k.toLowerCase().includes(filter)||(u.name||'').toLowerCase().includes(filter)||(u.pos||'').toLowerCase().includes(filter);});
  if(!keys.length){c.innerHTML="<p style='color:#888;text-align:center;padding:16px'>No users found.</p>";return;}
  c.innerHTML=keys.map(k=>{const u=allUsers[k];return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:1px solid var(--border);gap:7px"><div style="flex:1;min-width:0"><b>${u.name||'-'}</b> <span style="background:rgba(88,166,255,0.15);color:var(--primary);font-size:10px;padding:1px 6px;border-radius:9px;margin-left:4px">${u.id||k}</span><br><small style="color:#888">${u.pos||'—'}</small></div><div style="display:flex;gap:5px"><button onclick="editUser('${k}')" class="btn btn-primary" style="font-size:11px;padding:3px 8px">✏️</button><button onclick="delUser('${k}')" class="btn btn-danger" style="font-size:11px;padding:3px 8px">🗑️</button></div></div>`;}).join('');
}
function filterUsers(){renderUsers(document.getElementById('uSearch').value.toLowerCase().trim()||null);}
function editUser(id){editingUid=id;const u=allUsers[id];document.getElementById('uId').value=u.id||id;document.getElementById('uId').disabled=true;document.getElementById('uName').value=u.name||'';document.getElementById('uPos').value=u.pos||'';document.getElementById('uPass').value='';document.getElementById('uPassLbl').innerHTML='New Password <span style="color:#888;font-weight:normal">(blank=keep)</span>';document.getElementById('uFormTitle').innerText='✏️ Edit: '+(u.name||id);document.getElementById('uCancelBtn').style.display='inline-block';showUMsg('');document.getElementById('uName').focus();}
function cancelUserEdit(){editingUid=null;['uId','uName','uPos','uPass'].forEach(id=>document.getElementById(id).value='');document.getElementById('uId').disabled=false;document.getElementById('uPassLbl').innerHTML='Password *';document.getElementById('uFormTitle').innerText='➕ Add New User';document.getElementById('uCancelBtn').style.display='none';showUMsg('');}
function saveUser(){const id=editingUid||document.getElementById('uId').value.trim();const name=document.getElementById('uName').value.trim(),pos=document.getElementById('uPos').value.trim(),pass=document.getElementById('uPass').value.trim();if(!id){showUMsg('⚠️ Staff ID required.',true);return;}if(!name){showUMsg('⚠️ Name required.',true);return;}if(!pos){showUMsg('⚠️ Position required.',true);return;}if(!editingUid&&!pass){showUMsg('⚠️ Password required.',true);return;}const data={id,name,pos,pass:pass||(editingUid?allUsers[editingUid].pass:'')};db.ref('users/'+id).update(data).then(()=>{showUMsg(editingUid?'✅ Updated!':'✅ Created!');cancelUserEdit();loadUsers();}).catch(e=>showUMsg('❌ '+e.message,true));}
function delUser(id){if(!confirm('Delete "'+( allUsers[id]?.name||id)+'"?'))return;db.ref('users/'+id).remove().then(loadUsers);}
function showUMsg(m,e){const el=document.getElementById('uMsg');el.style.display=m?'block':'none';el.style.color=e?'#da3633':'#3fb950';el.innerText=m;}

window.onload=()=>{
  document.body.setAttribute('data-theme',localStorage.getItem('theme')||'dark');
  startClock();
  startListeners();
};
</script>
</body>
